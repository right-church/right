<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90일 성경통독 가이드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --yt-red: #ff0000;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        .wrapper {
            max-width: 650px;
            margin: 30px auto;
            padding: 0 15px;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 1.7rem;
            color: var(--primary);
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        header p {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 500;
            margin: 0;
        }

        .prayer-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-left: 5px solid var(--accent);
        }

        .prayer-box h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            color: var(--primary);
        }

        .prayer-box p {
            margin: 0;
            font-size: 0.95rem;
            color: #475569;
            font-style: italic;
        }

        /* 카드 스타일 */
        .day-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .day-header {
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 12px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        /* 1일차 + 성경범위 레이아웃 */
        .header-text {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 2px;
        }

        .day-num {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 700;
        }

        .bible-range {
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary);
        }

        .right-icons {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .yt-btn {
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .yt-btn:hover { transform: scale(1.1); }

        .yt-icon { width: 24px; height: 24px; fill: var(--yt-red); }

        .chevron {
            font-size: 0.7rem;
            color: #94a3b8;
            transition: transform 0.3s ease;
        }

        .day-card.open .chevron { transform: rotate(180deg); }

        /* 본문 내용 */
        .day-content {
            display: none;
            padding: 0 20px 20px 52px; /* 체크박스 라인 맞춤 */
            background: #ffffff;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .day-card.open .day-content { display: block; }

        .inner-text {
            font-size: 0.95rem;
            color: #334155;
            white-space: pre-wrap;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-sub);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>90일 성경통독 가이드</h1>
        <p>SPRING 2025 JOURNEY</p>
    </header>

    <div class="prayer-box">
        <h3>🙏 통독을 위한 '1분 기도'</h3>
        <p>"말씀이 삶이 되는 하루를 살도록 도와주옵소서. 아멘!"</p>
    </div>

    <div id="accordion-list"></div>

    <footer>
        © 2025 Bible Guide | 소책자 원문 텍스트 수록
    </footer>
</div>

<script>
    const bibleData = [
        { day: 1, range: "창세기 1장 ~ 13장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BMuRE3pIOyTsa8tH7bvui6d", text: "<창조> 태초에 하나님이 천지를 창조하셨습니다.\n<타락> 인간은 하나님께 불순종하여 에덴에서 쫓겨납니다.\n<홍수> 노아의 가족을 제외하고 심판을 받습니다.\n<바벨탑> 언어를 혼잡하게 하심으로 흩어지게 됩니다." },
        { day: 2, range: "창세기 13장 ~ 26장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BO_pXDFxy81YLl2SOvx8S0J", text: "<아브람> 아브람을 부르시고 복의 근원이 된다는 언약을 주셨습니다.\n<소돔과 고모라> 하나님께서 유황과 불을 쏟아 부으셨습니다.\n<이삭> 하나님께서 이삭을 제물로 바치라고 명령하셨고 순종합니다." },
        { day: 3, range: "창세기 27장 ~ 39장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BMjdfSI8Wtwof9hlHRNx6U7", text: "<야곱> 야곱은 아버지 이삭을 속여 에서가 받을 복을 빼앗습니다. 이후 '이스라엘'이라는 이름을 얻게 됩니다." },
        { day: 4, range: "창세기 40장 ~ 출애굽기 2장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BNiYvL8yM-429YkakNPbmz2", text: "<요셉> 애굽의 총리가 되어 가족들을 구원하게 됩니다." },
        { day: 5, range: "출애굽기 3장 ~ 15장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BPUC7oPQjmdgrP_H1PLkvOP", text: "<모세> 떨기나무 아래에서 모세를 부르셨습니다.\n<10재앙> 이스라엘 백성을 출애굽하게 하셨습니다." },
        { day: 6, range: "출애굽기 16장 ~ 29장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BPzdRpYDnrlt4B-KPKOujuP", text: "<시내산 언약> 하나님의 법, 십계명을 받습니다." },
        { day: 7, range: "출애굽기 30장 ~ 레위기 2장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BNVg8d8MhrMJPBaXPc9eDdF", text: "<성막> 하나님이 거하실 성막의 구체적 지침을 받습니다." },
        { day: 8, range: "레위기 3장 ~ 15장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BNbc9odp9p3K_eKmoT5Puer", text: "<5제사 7절기> 거룩한 예배와 절기에 대해 배웁니다." },
        { day: 9, range: "레위기 16장 ~ 민수기 1장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BNvkm3WXStB1h17LOAthoKM", text: "<거룩한 삶> 일상과 공동체 속에서의 정결함을 배웁니다." },
        { day: 10, range: "민수기 2장 ~ 14장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BPDpVAe4KSLM11H-5bU1Dn5", text: "<가데스 바네아> 약속의 땅 앞에서 열두 정탐꾼이 보고합니다." },
        { day: 11, range: "민수기 15장 ~ 27장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BOM1XqaRzkAkYmfK3HeBfbT", text: "<광야 생활> 불순종으로 인한 40년의 방황이 시작됩니다." },
        { day: 12, range: "민수기 28장 ~ 신명기 4장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BPRpt6Ph5r5Vbap1Y1KV0Xg", text: "<회고> 모세가 지난 세월의 은혜를 다음 세대에게 전합니다." },
        { day: 13, range: "신명기 5장 ~ 17장", yt: "https://www.youtube.com/playlist?list=PLeNzsZiWd1BM6Px2xlKgl1M0kMIxpsNkG", text: "<쉐마> 마음을 다해 하나님을 사랑할 것을 가르칩니다." }
    ];

    const list = document.getElementById('accordion-list');
    let checks = JSON.parse(localStorage.getItem('bible_final_check')) || [];

    bibleData.forEach(item => {
        const isChecked = checks.includes(item.day);
        const card = document.createElement('div');
        card.className = 'day-card';
        
        card.innerHTML = `
            <div class="day-header" onclick="this.parentElement.classList.toggle('open')">
                <input type="checkbox" ${isChecked ? 'checked' : ''} 
                       onclick="event.stopPropagation(); saveCheck(${item.day}, this.checked)">
                <div class="header-text">
                    <span class="day-num">${item.day}일차</span>
                    <span class="bible-range">${item.range}</span>
                </div>
                <div class="right-icons">
                    <a href="${item.yt}" target="_blank" class="yt-btn" onclick="event.stopPropagation();">
                        <svg class="yt-icon" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    </a>
                    <span class="chevron">▼</span>
                </div>
            </div>
            <div class="day-content">
                <div class="inner-text">${item.text}</div>
            </div>
        `;
        list.appendChild(card);
    });

    function saveCheck(day, isChecked) {
        if (isChecked) {
            if (!checks.includes(day)) checks.push(day);
        } else {
            checks = checks.filter(d => d !== day);
        }
        localStorage.setItem('bible_final_check', JSON.stringify(checks));
    }
</script>

</body>
</html>
