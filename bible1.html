<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90일 성경통독 가이드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --yt-red: #ff0000;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        .wrapper {
            max-width: 650px;
            margin: 30px auto;
            padding: 0 15px;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 1.7rem;
            color: var(--primary);
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        header p {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 500;
            margin: 0;
        }

        .prayer-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-left: 5px solid var(--accent);
        }

        .prayer-box h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            color: var(--primary);
        }

        .prayer-box p {
            margin: 0;
            font-size: 0.95rem;
            color: #475569;
            font-style: italic;
        }

        .day-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .day-header {
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 12px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 2px;
        }

        .day-num {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 700;
        }

        .bible-range {
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary);
        }

        .right-icons {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .yt-btn {
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .yt-btn:hover { transform: scale(1.1); }

        .yt-icon { width: 24px; height: 24px; fill: var(--yt-red); }

        .chevron {
            font-size: 0.7rem;
            color: #94a3b8;
            transition: transform 0.3s ease;
        }

        .day-card.open .chevron { transform: rotate(180deg); }

        .day-content {
            display: none;
            padding: 0 20px 20px 52px;
            background: #ffffff;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .day-card.open .day-content { display: block; }

        .inner-text {
            font-size: 0.95rem;
            color: #334155;
            white-space: pre-wrap;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-sub);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>90일 성경통독 가이드</h1>

    <footer>
        © 2025 Bible Guide | 90일 전체 데이터 수록
    </footer>
</div>

        { day: 58, range: "예레미야 26~38장", text: "<새 언약>\n마음에 새겨질 새 언약과 소망의 말씀, 그러나 계속되는 박해를 봅니다." },
        { day: 59, range: "예레미야 39~51장", text: "<멸망과 탄식>\n예루살렘의 함락과 열방에 대한 하나님의 준엄한 심판을 읽습니다." },
        { day: 60, range: "예레미야 52~에스겔 12장", text: "<에스겔의 환상>\n바벨론 포로지에서 본 하나님의 영광과 파수꾼의 사명을 읽습니다." },
        { day: 61, range: "에스겔 13~25장", text: "<우상숭배의 결과>\n성전을 떠나시는 하나님의 영광과 이스라엘의 영적 간음을 봅니다." },
        { day: 62, range: "에스겔 26~38장", text: "<마른 뼈의 부활>\n에스겔 골짜기의 마른 뼈들이 살아나 군대가 되는 회복의 환상을 봅니다." },
        { day: 63, range: "에스겔 39~다니엘 3장", text: "<다니엘의 신앙>\n새 성전의 환상과 풀무불 속에서도 지켜주시는 다니엘 친구들의 믿음을 봅니다." },
        { day: 64, range: "다니엘 4~호세아 4장", text: "<하나님은 사랑이시라>\n다니엘의 환상과 음란한 아내를 끝까지 사랑하는 호세아의 사랑을 봅니다." },
        { day: 65, range: "호세아 5~아모스 3장", text: "<정의의 외침>\n오직 정의를 물 같이, 공의를 마르지 않는 강 같이 흐르게 하라!" },
        { day: 66, range: "아모스 4~미가 2장", text: "<미가의 탄식>\n불의한 지도자들에 대한 규탄과 평화의 왕에 대한 예언을 읽습니다." },
        { day: 67, range: "미가 3~나훔 3장", text: "<니느웨의 심판>\n앗수르의 수도 니느웨의 교만을 심판하시는 공의의 하나님을 봅니다." },
        { day: 68, range: "하박국 1~학개 2장", text: "<오직 의인은 믿음으로>\n이해가 안 되는 현실 속에서도 하나님으로 즐거워하는 하박국의 노래입니다." },
        { day: 69, range: "스가랴 1~13장", text: "<성전 재건의 환상>\n밤의 환상들을 통해 성전 재건을 독려하시는 소망의 메시지입니다." },
        { day: 70, range: "스가랴 14~마태복음 12장", text: "<그리스도의 오심>\n말라기의 경고를 끝으로 구약이 닫히고, 왕으로 오신 예수님의 탄생과 사역이 시작됩니다." },
        { day: 71, range: "마태복음 13~25장", text: "<천국 비유와 교훈>\n비유를 통해 천국을 가르치시고 제자들을 훈련시키시는 주님을 만납니다." },
        { day: 72, range: "마태복음 26~마가복음 10장", text: "<고난과 섬김>\n십자가 죽음과 부활, 그리고 섬기러 오신 인자 예수님을 봅니다." },
        { day: 73, range: "마가복음 11~누가복음 1장", text: "<누가의 기록>\n예루살렘 입성과 인류의 구주로 오신 예수님의 정교한 탄생 기록을 봅니다." },
        { day: 74, range: "누가복음 2~14장", text: "<잃어버린 자를 찾아>\n가난하고 소외된 자들을 긍휼히 여기시는 예수님의 사랑을 읽습니다." },
        { day: 75, range: "누가복음 15~24장", text: "<부활의 증인>\n탕자의 비유와 십자가 사건, 그리고 엠마오로 가는 제자들과 함께하신 주님을 봅니다." },
        { day: 76, range: "요한복음 1~12장", text: "<말씀이 육신이 되어>\n태초부터 계신 말씀, 하나님의 아들 예수 그리스도의 표적들을 봅니다." },
        { day: 77, range: "요한복음 13~사도행전 3장", text: "<성령의 강림>\n주님의 고별 설교와 승천, 그리고 마가 다락방에 임한 성령의 역사를 읽습니다." },
        { day: 78, range: "사도행전 4~16장", text: "<복음의 확장>\n스데반의 순교와 바울의 회심, 그리고 이방인에게로 퍼져가는 복음의 파도를 봅니다." },
        { day: 79, range: "사도행전 17~28장", text: "<땅 끝까지>\n바울의 전도 여행과 로마 압송 중에도 멈추지 않는 하나님 나라의 전파를 봅니다." },
        { day: 80, range: "로마서 1~12장", text: "<오직 믿음으로>\n죄인 된 인간이 믿음으로 말미암아 의롭게 되는 복음의 정수를 읽습니다." },
        { day: 81, range: "로마서 13~고린도전서 9장", text: "<교회의 질서>\n사랑의 빚 외에는 지지 말라는 권면과 고린도 교회의 분쟁에 대한 대답입니다." },
        { day: 82, range: "고린도전서 10~고린도후서 6장", text: "<사랑과 화목>\n사랑 장(13장)과 부활 소망, 그리고 화목하게 하는 직분을 읽습니다." },
        { day: 83, range: "고린도후서 7~갈라디아서 6장", text: "<자유의 복음>\n율법의 멍에를 벗고 그리스도 안에서 누리는 참된 자유를 노래합니다." },
        { day: 84, range: "에베소서 1~골로새서 4장", text: "<교회의 머리 되신 주>\n그리스도 안에서 하나 된 교회와 만물의 머리 되신 예수님을 찬양합니다." },
        { day: 85, range: "데살로니가전서 1~디모데전서 6장", text: "<다시 오실 주님>\n주님의 재림을 기다리는 태도와 믿음의 아들 디모데를 향한 목회적 권면입니다." },
        { day: 86, range: "디모데후서 1~히브리서 3장", text: "<더 뛰어난 예수>\n디모데를 향한 마지막 부탁과 천사보다, 모세보다 뛰어난 예수님을 봅니다." },
        { day: 87, range: "히브리서 4~야고보서 1장", text: "<대제사장과 믿음>\n영원한 대제사장 되신 주님과 시련 중에 인내하는 믿음의 도를 읽습니다." },
        { day: 88, range: "야고보서 2~요한일서 2장", text: "<행함과 사랑>\n행함이 있는 믿음과 하나님은 사랑이시라는 사도 요한의 고백을 봅니다." },
        { day: 89, range: "요한일서 3~요한계시록 8장", text: "<이기는 자>\n서로 사랑하라는 계명과 마지막 때에 일곱 인을 떼시는 어린 양을 봅니다." },
        { day: 90, range: "요한계시록 9~22장", text: "<새 예루살렘>\n모든 눈물을 닦아주시는 새 하늘과 새 땅, 다시 오실 주님을 찬양하며 마칩니다." }
    ];

    const list = document.getElementById('accordion-list');
    let checks = JSON.parse(localStorage.getItem('bible_90day_complete')) || [];

    bibleData.forEach(item => {
        const isChecked = checks.includes(item.day);
        const card = document.createElement('div');
        card.className = 'day-card';
        if(isChecked) card.style.opacity = "0.8";
        
        card.innerHTML = `
            <div class="day-header" onclick="this.parentElement.classList.toggle('open')">
                <input type="checkbox" ${isChecked ? 'checked' : ''} 
                       onclick="event.stopPropagation(); saveCheck(${item.day}, this.checked, this)">
                <div class="header-text">
                    <span class="day-num">${item.day}일차</span>
                    <span class="bible-range">${item.range}</span>
                </div>
                <div class="right-icons">
                    ${item.yt ? `
                    <a href="${item.yt}" target="_blank" class="yt-btn" onclick="event.stopPropagation();">
                        <svg class="yt-icon" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    </a>` : ''}
                    <span class="chevron">▼</span>
                </div>
            </div>
            <div class="day-content">
                <div class="inner-text">${item.text}</div>
            </div>
        `;
        list.appendChild(card);
    });

    function saveCheck(day, isChecked, el) {
        if (isChecked) {
            if (!checks.includes(day)) checks.push(day);
            el.closest('.day-card').style.opacity = "0.8";
        } else {
            checks = checks.filter(d => d !== day);
            el.closest('.day-card').style.opacity = "1";
        }
        localStorage.setItem('bible_90day_complete', JSON.stringify(checks));
    }
</script>

</body>
