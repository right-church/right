<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올바른 90일 성경통독</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #fdfcfb; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: 30px; }
        .intro-box { background: #f9f9f9; padding: 15px; border-radius: 8px; font-size: 0.9em; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .progress-section { position: sticky; top: 10px; background: white; padding: 10px; z-index: 10; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .progress-bar { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
        #fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        .day-card { border: 1px solid #eee; margin-bottom: 15px; border-radius: 10px; padding: 15px; transition: 0.2s; }
        .day-card:hover { border-color: var(--accent); }
        .day-header { display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
        .summary { font-size: 0.85em; color: #666; margin-top: 8px; padding-left: 35px; }
        .read-btn { font-size: 0.8em; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 4px; }
        .completed { background: #f4f4f4; opacity: 0.6; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📖 올바른 90일 성경통독</h1>
        <p>Spring 2025: 3월 10일 ~ 6월 21일</p>
    </div>

    <div class="intro-box">
        <strong>🙏 성경 읽기 전 1분 기도</strong><br>
        "나의 지식적인 머리로 이해하지 않게 하시고, 성령님께서 조명해 주셔서 정확하게 깨닫고 말씀이 삶이 되는 하루를 살게 하소서." 
    </div>

    <div class="progress-section">
        <div class="progress-bar"><div id="fill"></div></div>
        <p style="text-align:right; font-size: 0.8em; margin: 5px 0;">달성률: <span id="percent">0</span>%</p>
    </div>

    <div id="list"></div>
</div>

<script>
    // PDF 소책자 기반 데이터 (5~9페이지 내용 반영)
    const bibleData = [
        { day: 1, range: "창세기 1-13장", summary: "천지창조, 인간의 타락, 노아 홍수와 바벨탑 사건 ", link: "http://bible.godpia.com/read/reading.asp?ver=gaen&vol=gen&chap=1&sec=1" },
        { day: 2, range: "창세기 14-26장", summary: "아브람의 부르심과 언약, 소돔과 고모라 심판, 이삭의 탄생 [cite: 19, 21, 22]", link: "http://bible.godpia.com/read/reading.asp?ver=gaen&vol=gen&chap=14&sec=1" },
        { day: 3, range: "창세기 27-39장", summary: "야곱의 도망과 결혼, 12아들의 탄생, 요셉의 팔려감 [cite: 23, 24, 25]", link: "http://bible.godpia.com/read/reading.asp?ver=gaen&vol=gen&chap=27&sec=1" },
        { day: 4, range: "창세기 40장-출애굽기 2장", summary: "요셉의 애굽 총리 등극과 가족 구원, 모세의 탄생 [cite: 27, 28, 29]", link: "http://bible.godpia.com/read/reading.asp?ver=gaen&vol=gen&chap=40&sec=1" },
        { day: 5, range: "출애굽기 3-15장", summary: "모세의 부르심, 애굽의 10재앙, 홍해의 기적 [cite: 29, 30, 31]", link: "http://bible.godpia.com/read/reading.asp?ver=exo&chap=3&sec=1" },
        { day: 6, range: "출애굽기 16-29장", summary: "만나와 메추라기, 시내산 언약과 십계명 [cite: 32, 33, 34]", link: "http://bible.godpia.com/read/reading.asp?ver=exo&chap=16&sec=1" }
        // ... (나머지 90일까지의 데이터도 PDF 표에 맞춰 추가 가능)
    ];

    // 나머지 90일까지의 범위 자동 추가 로직 (데이터가 없는 경우)
    for(let i=7; i<=90; i++) {
        if(!bibleData[i-1]) bibleData.push({ day: i, range: `통독 ${i}일차 범위`, summary: "소책자 일정표를 확인하세요.", link: "http://bible.godpia.com" });
    }

    let storage = JSON.parse(localStorage.getItem('bible90')) || [];

    function draw() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        bibleData.forEach(item => {
            const isDone = storage.includes(item.day);
            const card = document.createElement('div');
            card.className = `day-card ${isDone ? 'completed' : ''}`;
            card.innerHTML = `
                <div class="day-header">
                    <span><input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggle(${item.day})"> Day ${item.day} (${item.range})</span>
                    <a href="${item.link}" target="_blank" class="read-btn">본문읽기</a>
                </div>
                <div class="summary">${item.summary}</div>
            `;
            list.appendChild(card);
        });
        update();
    }

    function toggle(day) {
        if(storage.includes(day)) storage = storage.filter(d => d !== day);
        else storage.push(day);
        localStorage.setItem('bible90', JSON.stringify(storage));
        draw();
    }

    function update() {
        const per = Math.round((storage.length / bibleData.length) * 100);
        document.getElementById('fill').style.width = per + '%';
        document.getElementById('percent').innerText = per;
    }

    draw();
</script>

</body>
</html>
