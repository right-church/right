<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올바른 90일 성경통독 완벽 가이드</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #fdfcfb;
            --text: #333;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 650px; width: 100%; padding: 20px; box-sizing: border-box; }

        header {
            text-align: center; padding: 40px 20px; background: white;
            border-bottom: 3px solid var(--primary); margin-bottom: 20px;
            border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }
        .subtitle { color: var(--accent); font-weight: bold; margin-top: 5px; }

        .intro-box {
            background: #fff9f4; padding: 20px; border-radius: 12px;
            border-left: 5px solid var(--accent); margin-bottom: 30px; 
            font-size: 0.95rem; text-align: left; /* 왼쪽 정렬 */
        }

        .sticky-nav {
            position: sticky; top: 0; background: var(--bg);
            padding: 15px 0; z-index: 100; border-bottom: 1px solid #eee;
        }
        .progress-wrapper {
            background: #eee; height: 18px; border-radius: 10px; overflow: hidden;
        }
        #progress-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #f39c12, #e67e22);
            transition: width 0.5s ease;
        }
        .stats {
            display: flex; justify-content: space-between;
            font-size: 0.85rem; font-weight: bold; margin-top: 8px; color: var(--primary);
        }

        /* 일차별 카드 (왼쪽 정렬) */
        .day-card {
            background: white; border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden;
            border: 1px solid #eee; text-align: left;
        }

        .day-header {
            padding: 15px 20px; display: flex; align-items: center;
            justify-content: space-between; cursor: pointer; transition: background 0.2s;
        }
        .day-header:hover { background: #fcfcfc; }
        
        .day-left { display: flex; align-items: center; gap: 12px; }
        .day-badge {
            background: var(--primary); color: white; padding: 3px 10px;
            border-radius: 15px; font-size: 0.8rem; font-weight: bold;
        }
        .day-range { font-weight: 700; font-size: 1rem; }

        .day-content {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            background: #fafafa;
        }
        .day-content.active { max-height: 2000px; border-top: 1px solid #eee; }

        .inner-text { padding: 20px; font-size: 0.95rem; color: #444; white-space: pre-wrap; }
        
        .bible-btn {
            display: inline-block; margin-top: 15px; padding: 8px 15px;
            background: white; border: 1px solid var(--accent); color: var(--accent);
            text-decoration: none; border-radius: 5px; font-size: 0.85rem; font-weight: bold;
        }
        .bible-btn:hover { background: var(--accent); color: white; }

        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }

        footer { text-align: center; padding: 40px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>📖 올바른 90일 성경통독</h1>
    <div class="subtitle">Spring 2025 (3/10 ~ 6/21)</div>
</header>

<div class="container">
    <div class="intro-box">
        <strong>🙏 성경 읽기 전 '1분 기도'</strong><br>
        "사랑하는 주님, 제가 읽을 이 성경이 하나님의 말씀임을 믿습니다. 나의 지식적인 머리로 이해하지 않게 하시고, 성령님께서 조명해 주셔서 정확하게 깨닫고 말씀이 삶이 되는 하루를 살도록 도와주옵소서. 예수님의 이름으로 기도합니다. 아멘!"
    </div>

    <div class="sticky-nav">
        <div class="progress-wrapper"><div id="progress-bar"></div></div>
        <div class="stats">
            <span>진행률: <span id="percent">0</span>%</span>
            <span><span id="count">0</span> / 90일 완료</span>
        </div>
    </div>

    <div id="day-list" class="day-list"></div>

    <footer>
        © 2025 올바른 성경통독 모임 | 소책자 5쇄 전권 수록
    </footer>
</div>

        { day: 54, range: "이사야 39장~51장", vol: "isa", chap: 39, text: "<위로> 내 백성을 위로하라.\n<새 일> 광야에 길을, 사막에 강을." },
        { day: 55, range: "이사야 52장~64장", vol: "isa", chap: 52, text: "<고난 받는 종> 그가 찔림은 우리의 허물 때문이라." },
        { day: 56, range: "이사야 65장~예레미야 10장", vol: "isa", chap: 65, text: "<새 하늘과 새 땅> 약속.\n<눈물의 선지자> 예레미야의 소명과 외침." },
        { day: 57, range: "예레미야 11장~23장", vol: "jer", chap: 11, text: "<생수의 근원> 하나님을 버린 이스라엘." },
        { day: 58, range: "예레미야 24장~36장", vol: "jer", chap: 24, text: "<새 언약> 돌판이 아닌 마음에 새길 약속." },
        { day: 59, range: "예레미야 37장~49장", vol: "jer", chap: 37, text: "<유다의 최후> 시드기야의 패배와 예루살렘의 함락." },
        { day: 60, range: "예레미야 50장~에스겔 10장", vol: "jer", chap: 50, text: "<에스겔> 그발 강가의 환상.\n<파수꾼> 죄인에게 돌이키라 명하시는 파수꾼." },
        { day: 61, range: "에스겔 11장~23장", vol: "ezk", chap: 11, text: "<새 마음> 굳은 마음을 제거하고 부드러운 마음을 주리라." },
        { day: 62, range: "에스겔 24장~36장", vol: "ezk", chap: 24, text: "<참 목자> 잃어버린 양을 찾으시는 하나님." },

        { day: 64, range: "다니엘 1장~12장", vol: "dan", chap: 1, text: "<뜻을 정한 다니엘> 우상 제물을 거부함.\n<사자굴과 풀무불> 그리 아니하실지라도의 믿음." },
        { day: 65, range: "호세아 1장~14장", vol: "hos", chap: 1, text: "<호세아의 사랑> 변치 않는 하나님의 추적하시는 사랑." },
        { day: 66, range: "요엘 1장~아모스 9장", vol: "joe", chap: 1, text: "<아모스> 공의를 물 같이 흐르게 하라." },
        { day: 67, range: "오바댜 1장~미가 7장", vol: "oba", chap: 1, text: "<미가> 하나님이 구하시는 것, 겸손히 하나님과 동행함." },
        { day: 68, range: "나훔 1장~하박국 3장", vol: "nah", chap: 1, text: "<하박국> 비록 무화과나무가 무성치 못할지라도 여호와로 즐거워함." },
        { day: 69, range: "스바냐 1장~스가랴 2장", vol: "zep", chap: 1, text: "<스바냐> 너의 하나님 여호와가 너로 인하여 기쁨을 이기지 못하시며." },
        { day: 70, range: "스가랴 3장~말라기 4장", vol: "zec", chap: 3, text: "<말라기> 돌아오라, 내가 너희에게로 돌아가리라." },
        { day: 71, range: "마태복음 1장~13장", vol: "mat", chap: 1, text: "<왕으로 오신 예수> 천국 복음의 전파.\n<산상수훈> 천국 백성의 삶." },
        { day: 72, range: "마태복음 14장~28장", vol: "mat", chap: 14, text: "<십자가와 부활> 내가 세상 끝날까지 함께하리라." },
        { day: 73, range: "마가복음 1장~16장", vol: "mar", chap: 1, text: "<종으로 오신 예수> 섬기러 오신 인자." },
        { day: 74, range: "누가복음 1장~12장", vol: "luk", chap: 1, text: "<인자로 오신 예수> 소외된 자들의 친구." },
        { day: 75, range: "누가복음 13장~24장", vol: "luk", chap: 13, text: "<탕자의 비유> 돌아오는 자를 기뻐하시는 아버지." },
        { day: 76, range: "요한복음 1장~11장", vol: "jhn", chap: 1, text: "<하나님의 아들 예수> 태초에 말씀이 계시니라." },
        { day: 77, range: "요한복음 12장~21장", vol: "jhn", chap: 12, text: "<사랑의 계명> 서로 사랑하라.\n<성령 약속> 보혜사 성령." },
        { day: 78, range: "사도행전 1장~14장", vol: "act", chap: 1, text: "<성령 강림> 권능을 받고 증인이 되리라.\n<베드로의 설교> 복음 전파의 시작." },
        { day: 79, range: "사도행전 15장~28장", vol: "act", chap: 15, text: "<바울의 선교> 이방인에게 향하는 복음.\n<로마 전도> 거침없이 담대하게." },
        { day: 80, range: "로마서 1장~16장", vol: "rom", chap: 1, text: "<이신칭의> 오직 의인은 믿음으로 살리라.\n<사랑의 법> 하나님의 사랑에서 끊을 수 없음." },
        { day: 81, range: "고린도전서 1장~16장", vol: "1co", chap: 1, text: "<사랑장> 사랑은 오래 참고.\n<부활장> 그리스도께서 살아나셨느니라." },
        { day: 82, range: "고린도후서 1장~13장", vol: "2co", chap: 1, text: "<위로> 약한 때에 강함이라." },
        { day: 83, range: "갈라디아서 1장~에베소서 6장", vol: "gal", chap: 1, text: "<성령의 열매> 사랑, 희락, 화평... \n<전신갑주> 악의 세력에 대적하라." },
        { day: 84, range: "빌립보서 1장~데살로니가후서 3장", vol: "php", chap: 1, text: "<기쁨> 항상 기뻐하라.\n<재림> 주의 날이 도둑 같이 임할 줄을 알라." },
        { day: 85, range: "디모데전서 1장~빌레몬서 1장", vol: "1ti", chap: 1, text: "<선한 싸움> 믿음의 선한 싸움을 싸우라." },
        { day: 86, range: "히브리서 1장~13장", vol: "heb", chap: 1, text: "<믿음> 믿음은 바라는 것들의 실상이요.\n<예수> 믿음의 주요 온전케 하시는 이를 바라보자." },
        { day: 87, range: "야고보서 1장~베드로후서 3장", vol: "jas", chap: 1, text: "<행함> 행함 없는 믿음은 죽은 것이라.\n<산 소망> 썩지 않고 더럽지 않은 유업." },
        { day: 88, range: "요한일서 1장~유다서 1장", vol: "1jn", chap: 1, text: "<하나님은 사랑> 하나님 안에 거하는 자." },
        { day: 89, range: "요한계시록 1장~11장", vol: "rev", chap: 1, text: "<보좌의 환상> 거룩하다, 거룩하다, 거룩하다." },
        { day: 90, range: "요한계시록 12장~22장", vol: "rev", chap: 12, text: "<최후 승리> 다시 밤이 없겠고 주님이 비치심.\n<마침> 아멘 주 예수여 오시옵소서." }
    ];

    const dayListDiv = document.getElementById('day-list');
    let completed = JSON.parse(localStorage.getItem('bible_90days_status')) || [];

    function render() {
        dayListDiv.innerHTML = '';
        bibleData.forEach(item => {
            const isDone = completed.includes(item.day);
            const card = document.createElement('div');
            card.className = 'day-card';
            
            const bibleLink = `http://bible.godpia.com/read/reading.asp?ver=gaen&vol=${item.vol}&chap=${item.chap}&sec=1`;

            card.innerHTML = `
                <div class="day-header" onclick="toggleAccordion(this)">
                    <div class="day-left">
                        <input type="checkbox" ${isDone ? 'checked' : ''} onclick="event.stopPropagation(); toggleCheck(${item.day})">
                        <span class="day-badge">Day ${item.day}</span>
                        <span class="day-range" style="${isDone ? 'text-decoration:line-through; color:#bbb;' : ''}">${item.range}</span>
                    </div>
                    <span>▼</span>
                </div>
                <div class="day-content">
                    <div class="inner-text">
                        ${item.text}
                        <br>
                        <a href="${bibleLink}" target="_blank" class="bible-btn">성경 본문 읽기 🔗</a>
                    </div>
                </div>
            `;
            dayListDiv.appendChild(card);
        });
        updateProgress();
    }

    window.toggleAccordion = function(header) {
        const content = header.nextElementSibling;
        content.classList.toggle('active');
        header.querySelector('span:last-child').innerText = content.classList.contains('active') ? '▲' : '▼';
    };

    window.toggleCheck = function(day) {
        if (completed.includes(day)) {
            completed = completed.filter(d => d !== day);
        } else {
            completed.push(day);
        }
        localStorage.setItem('bible_90days_status', JSON.stringify(completed));
        render();
    };

    function updateProgress() {
        const percentage = Math.round((completed.length / 90) * 100);
        document.getElementById('progress-bar').style.width = percentage + '%';
        document.getElementById('percent').innerText = percentage;
        document.getElementById('count').innerText = completed.length;
    }

    render();
</script>

</body>
</html>
