<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올바른 90일 성경통독 가이드</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #fdfcfb;
            --text: #333;
        }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 650px; width: 100%; padding: 20px; box-sizing: border-box; }
        header { text-align: center; padding: 40px 20px; background: white; border-bottom: 3px solid var(--primary); margin-bottom: 20px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }
        .subtitle { color: var(--accent); font-weight: bold; margin-top: 5px; }
        .intro-box { background: #fff9f4; padding: 20px; border-radius: 12px; border-left: 5px solid var(--accent); margin-bottom: 30px; font-size: 0.95rem; }
        .sticky-nav { position: sticky; top: 0; background: var(--bg); padding: 15px 0; z-index: 100; border-bottom: 1px solid #eee; }
        .progress-wrapper { background: #eee; height: 18px; border-radius: 10px; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f39c12, #e67e22); transition: width 0.5s; }
        .stats { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; margin-top: 8px; color: var(--primary); }
        .day-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .day-card.completed { background: #f8f9fa; opacity: 0.7; }
        .day-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .day-info { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .day-number { background: var(--primary); color: white; padding: 3px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; min-width: 45px; text-align: center; }
        .day-range { font-weight: 700; font-size: 1rem; }
        .summary-text { margin-top: 10px; font-size: 0.88rem; color: #555; padding-left: 10px; border-left: 2px solid #ddd; }
        .read-link { text-decoration: none; color: var(--accent); font-size: 0.8rem; border: 1px solid var(--accent); padding: 3px 8px; border-radius: 5px; white-space: nowrap; }
        .completed .day-range, .completed .summary-text { text-decoration: line-through; color: #bbb; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>📖 올바른 90일 성경통독</h1>
    <div class="subtitle">Spring 2025 (3/10 ~ 6/21)</div>
</header>

<div class="container">
    <div class="intro-box">
        <strong>🙏 성경 읽기 전 '1분 기도'</strong><br>

    </div>

    <div class="sticky-nav">
        <div class="progress-wrapper"><div id="progress-bar"></div></div>
        <div class="stats">
            <span>달성도: <span id="percent">0</span>%</span>
            <span><span id="count">0</span> / 90일 완료</span>
        </div>
    </div>

    <div id="day-list"></div>
</div>

        { day: 64, range: "에스겔 35-48장", summary: "마른 뼈의 환상과 성전 회복, '여호와 삼마'를 기록합니다.", vol: "ezk", chap: 35 },
        { day: 65, range: "다니엘 1-12장", summary: "포로기 다니엘의 믿음과 제국들의 변천, 그리고 마지막 때에 대한 환상을 다룹니다.", vol: "dan", chap: 1 },
        { day: 66, range: "호세아 1-14장", summary: "음란한 아내 고멜을 통해 배역한 이스라엘을 향한 하나님의 포기하지 않는 사랑을 보여줍니다.", vol: "hos", chap: 1 },
        { day: 67, range: "요엘 1장-아모스 9장", summary: "여호와의 날의 경고와 공의가 물처럼 흐르게 하라는 아모스의 심판 메시지를 기록합니다.", vol: "joe", chap: 1 },
        { day: 68, range: "오바댜 1장-미가 7장", summary: "에돔 심판과 니느웨의 회개(요나), 베들레헴 메시아 탄생(미가)을 예언합니다.", vol: "oba", chap: 1 },
        { day: 69, range: "나훔 1장-학개 2장", summary: "니느웨의 멸망과 하박국의 믿음, 성전 재건을 촉구하는 학개의 메시지를 다룹니다.", vol: "nah", chap: 1 },
        { day: 70, range: "스가랴 1-14장, 말라기 1-4장", summary: "성전 재건 장려와 메시아 오심 예언, 구약의 마지막 권고와 약속을 기록합니다.", vol: "zec", chap: 1 },
        { day: 71, range: "마태복음 1-13장", summary: "유대인의 왕으로 오신 예수님의 족보와 공생애 시작, 산상수훈을 다룹니다.", vol: "mat", chap: 1 },
        { day: 72, range: "마태복음 14-28장", summary: "베드로의 신앙 고백과 십자가 고난, 부활과 대위임령을 기록합니다.", vol: "mat", chap: 14 },
        { day: 73, range: "마가복음 1-16장", summary: "종으로 오셔서 신속하게 일하시며 치유와 섬김의 본을 보이신 예수님을 다룹니다.", vol: "mar", chap: 1 },
        { day: 74, range: "누가복음 1-12장", summary: "인자로 오신 예수님의 탄생과 소외된 자들을 향한 긍휼과 가르침을 기록합니다.", vol: "luk", chap: 1 },
        { day: 75, range: "누가복음 13-24장", summary: "잃어버린 자를 찾아 오신 주님의 비유들과 부활 후 엠마오 도상의 나타나심을 보여줍니다.", vol: "luk", chap: 13 },
        { day: 76, range: "요한복음 1-11장", summary: "말씀이 육신이 되어 오신 하나님의 아들 예수 그리스도와 7가지 표적들을 다룹니다.", vol: "jhn", chap: 1 },
        { day: 77, range: "요한복음 12-21장", summary: "제자들의 발을 씻기신 주님의 사랑과 십자가, '나를 따르라'는 부르심을 기록합니다.", vol: "jhn", chap: 12 },
        { day: 78, range: "사도행전 1-14장", summary: "오순절 성령 강림과 예루살렘 교회의 시작, 바울의 1차 전도 여행을 다룹니다.", vol: "act", chap: 1 },
        { day: 79, range: "사도행전 15-28장", summary: "바울의 2, 3차 전도 여행과 로마 압송을 통해 땅끝까지 전파되는 복음을 기록합니다.", vol: "act", chap: 15 },
        { day: 80, range: "로마서 1-16장", summary: "복음의 정수이자 '오직 의인은 믿음으로 말미암아 살리라'는 구원의 진리를 설명합니다.", vol: "rom", chap: 1 },
        { day: 81, range: "고린도전서 1-16장", summary: "교회의 분쟁과 윤리 문제에 대한 대답과 사랑장(13장), 부활장(15장)을 다룹니다.", vol: "1co", chap: 1 },
        { day: 82, range: "고린도후서 1-13장", summary: "바울의 사도직 변호와 고난 중의 위로, 화목하게 하는 직분을 강조합니다.", vol: "2co", chap: 1 },
        { day: 83, range: "갈라디아서-에베소서", summary: "율법에서 자유한 복음과 그리스도 안에서의 새로운 정체성 및 교회론을 다룹니다.", vol: "gal", chap: 1 },
        { day: 84, range: "빌립보서-데살로니가후서", summary: "그리스도의 마음을 품은 기쁨의 서신과 종말을 기다리는 성도의 태도를 가르칩니다.", vol: "php", chap: 1 },
        { day: 85, range: "디모데전서-빌레몬서", summary: "목회 지침과 바울의 마지막 유언, 용서와 관용의 메시지를 기록합니다.", vol: "1ti", chap: 1 },
        { day: 86, range: "히브리서 1-13장", summary: "예수 그리스도가 구약의 제도와 약속을 최종 성취하신 분임을 증거합니다.", vol: "heb", chap: 1 },
        { day: 87, range: "야고보서-베드로후서", summary: "행함 있는 믿음과 고난 중에 소망을 가지는 성도의 삶을 가르칩니다.", vol: "jas", chap: 1 },
        { day: 88, range: "요한일서-유다서", summary: "하나님은 사랑이시라는 진리와 거짓 교사에 대한 경계를 다룹니다.", vol: "1jn", chap: 1 },
        { day: 89, range: "요한계시록 1-11장", summary: "소아시아 일곱 교회에 주시는 말씀과 하늘의 예배 환상을 보여줍니다.", vol: "rev", chap: 1 },
        { day: 90, range: "요한계시록 12-22장", summary: "최후 승리와 새 하늘과 새 땅, '아멘 주 예수여 오시옵소서'로 마무리됩니다.", vol: "rev", chap: 12 }
    ];

    const dayList = document.getElementById('day-list');
    const progressBar = document.getElementById('progress-bar');
    let completed = JSON.parse(localStorage.getItem('bible_status_2025')) || [];

    function render() {
        dayList.innerHTML = '';
        bibleData.forEach(item => {
            const isDone = completed.includes(item.day);
            const card = document.createElement('div');
            card.className = `day-card ${isDone ? 'completed' : ''}`;
            const link = `http://bible.godpia.com/read/reading.asp?ver=gaen&vol=${item.vol}&chap=${item.chap}&sec=1`;

            card.innerHTML = `
                <div class="day-top">
                    <div class="day-info">
                        <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggle(${item.day})">
                        <span class="day-number">Day ${item.day}</span>
                        <span class="day-range">${item.range}</span>
                    </div>
                    <a href="${link}" target="_blank" class="read-link">본문읽기 🔗</a>
                </div>
                <div class="summary-text">${item.summary}</div>
            `;
            dayList.appendChild(card);
        });
        update();
    }

    window.toggle = (day) => {
        if (completed.includes(day)) completed = completed.filter(d => d !== day);
        else completed.push(day);
        localStorage.setItem('bible_status_2025', JSON.stringify(completed));
        render();
    };

    function update() {
        const per = Math.round((completed.length / bibleData.length) * 100);
        progressBar.style.width = per + '%';
        document.getElementById('percent').innerText = per;
        document.getElementById('count').innerText = completed.length;
    }

    render();
</script>
