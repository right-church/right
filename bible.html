<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>90일 성경통독 출석부</title>
    <style>
        :root {
            --main-blue: #3498db;
            --dark-blue: #2c3e50;
            --light-bg: #f4f7f6;
            --border-color: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            text-align: center;
            color: var(--dark-blue);
            font-size: 1.4rem;
            margin: 15px 0;
        }

        .table-outer {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-inner {
            max-height: 75vh;
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        th:first-child, td:first-child {
            position: -webkit-sticky;
            position: sticky;
            left: 0;
            z-index: 10;
            min-width: 85px;
            background-color: #f8f9fa;
            border-right: 2px solid var(--main-blue);
            font-weight: bold;
        }

        th {
            background-color: var(--main-blue);
            color: white;
            padding: 12px 10px;
            font-size: 0.85rem;
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 5;
            border-bottom: 2px solid #2980b9;
            white-space: nowrap;
        }

        th:first-child {
            z-index: 15;
            background-color: var(--main-blue);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: #fff;
            text-align: center;
            min-width: 65px;
        }

        .plan-row td {
            background-color: #ebf5fb;
            font-size: 0.75rem;
            color: #2980b9;
            font-weight: bold;
            white-space: nowrap;
        }

        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--main-blue);
            -webkit-appearance: checkbox;
        }

        .footer-action { text-align: center; margin-top: 20px; padding-bottom: 30px; }
        .reset-btn {
            padding: 12px 24px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <h1>📖 90일 성경통독 출석부</h1>
    
    <div class="table-outer">
        <div class="table-inner">
            <table id="bible-table">
                <thead>
                    <tr id="header-row">
                        <th>구분 \ 일차</th>
                    </tr>
                </thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-action">
        <button class="reset-btn" onclick="secureReset()">데이터 전체 초기화</button>
    </div>

    <script>
        const members = ["김사라", "김성은", "김정동", "김하정", "박금희", "유진헌", "이영숙", "한진경"];
        const biblePlan = {
            1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29",
            7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5",
            13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1",
            19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3",
            25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28",
            31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38",
            37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75",
            43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4",
            49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32",
            55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45",
            61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7",
            67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19",
            73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9",
            79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3",
            85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22"
        };

        function render() {
            const headerRow = document.getElementById('header-row');
            const tbody = document.getElementById('attendance-body');

            for (let i = 1; i <= 90; i++) {
                const th = document.createElement('th');
                th.textContent = i + '일';
                headerRow.appendChild(th);
            }

            const planRow = document.createElement('tr');
            planRow.className = 'plan-row';
            const tdTitle = document.createElement('td');
            tdTitle.textContent = "읽을 말씀";
            planRow.appendChild(tdTitle);

            for (let i = 1; i <= 90; i++) {
                const td = document.createElement('td');
                td.textContent = biblePlan[i];
                planRow.appendChild(td);
            }
            tbody.appendChild(planRow);

            members.forEach(name => {
                const tr = document.createElement('tr');
                const tdName = document.createElement('td');
                tdName.textContent = name;
                tr.appendChild(tdName);

                for (let i = 1; i <= 90; i++) {
                    const td = document.createElement('td');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    const key = `check-${i}-${name}`;
                    cb.checked = localStorage.getItem(key) === 'true';
                    cb.onchange = (e) => localStorage.setItem(key, e.target.checked);
                    td.appendChild(cb);
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        // 비밀번호 확인 기능이 추가된 초기화 함수
        function secureReset() {
            const password = prompt("전체 데이터를 삭제하려면 비밀번호를 입력하세요.");
            
            if (password === null) return; // 취소 버튼 클릭 시

            if (password === "9191") {
                if (confirm("정말 모든 체크 기록을 삭제할까요? 이 작업은 되돌릴 수 없습니다.")) {
                    localStorage.clear();
                    location.reload();
                }
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
