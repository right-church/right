<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 출석부</title>
    <style>
        :root { 
            --main-blue: #4a90e2; 
            --accent-green: #50c878;
            --dark-blue: #1e272e; 
            --light-bg: #f5f7fa; 
            --card-bg: #ffffff;
            --border-color: #eef1f4; 
            --today-highlight: #f0f7ff;
            --text-main: #2d3436;
            --text-muted: #b2bec3;
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--light-bg); margin: 0; padding: 20px 0; color: var(--text-main); -webkit-text-size-adjust: none; }
        
        /* 헤더 섹션 */
        .header-container { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--dark-blue); font-size: 1.5rem; font-weight: 800; margin: 0 0 5px 0; letter-spacing: -0.8px; }
        #tongdok-period { font-size: 0.85rem; color: var(--text-muted); font-weight: 400; }
        
        .content-box { width: 92%; margin: 0 auto 15px auto; box-sizing: border-box; }
        
        /* 통계 카드 */
        .stats-container { background: var(--card-bg); padding: 22px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        .stats-grid { display: flex; margin-bottom: 20px; }
        .stat-item { text-align: center; flex: 1; position: relative; }
        .stat-item:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 1px; background: var(--border-color); }
        .stat-value { font-size: 1.3rem; font-weight: 800; color: var(--main-blue); display: block; margin-bottom: 4px; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }
        
        .progress-wrapper { background: #edf2f7; border-radius: 10px; height: 8px; width: 100%; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--main-blue), var(--accent-green)); height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1); }

        /* 테이블 디자인 - 칸 너비를 모바일에 맞게 소폭 조정 (52px) */
        .table-outer { background: var(--card-bg); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        .table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        
        th, td { border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); text-align: center; vertical-align: middle; }
        
        /* 고정 이름 열 */
        th:first-child, td:first-child { width: 65px; position: sticky; left: 0; z-index: 25; background: #fff; font-size: 0.82rem; font-weight: 700; border-right: 2px solid var(--main-blue); }
        th:not(:first-child), td:not(:first-child) { width: 52px; }
        
        /* 헤더 날짜 레이아웃 */
        th { background: #fbfcfd; color: var(--text-main); height: 65px; padding: 0; font-weight: 700; }
        .day-num { font-size: 0.9rem; display: block; margin-bottom: 1px; }
        .day-date { font-size: 0.65rem; font-weight: 400; color: var(--text-muted); }
        
        .plan-row td { background: #fafbfc; color: var(--main-blue); font-size: 0.65rem; font-weight: 700; height: 50px; line-height: 1.3; }
        
        /* 체크박스 커스텀 */
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; border-radius: 6px; border: 2px solid #ddd; appearance: none; -webkit-appearance: none; display: inline-block; position: relative; background: #fff; transition: all 0.2s; }
        input[type="checkbox"]:checked { background: var(--main-blue); border-color: var(--main-blue); }
        input[type="checkbox"]:checked::after { content: '✓'; color: white; position: absolute; left: 4px; top: -1px; font-size: 15px; font-weight: bold; }
        
        /* Today 하이라이트 표시 */
        .today-cell { background: var(--today-highlight) !important; position: relative; }
        th.today-cell .day-num, th.today-cell .day-date { color: var(--main-blue); font-weight: 800; }
        th.today-cell::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--main-blue); }

        /* 은혜나눔 게시판 */
        .board-container { background: var(--card-bg); border-radius: 20px; padding: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .board-title { font-size: 1.1rem; font-weight: 800; color: var(--dark-blue); margin-bottom: 20px; }
        .board-item { padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .msg-name { font-weight: 700; color: var(--main-blue); font-size: 0.8rem; margin-bottom: 4px; display: block; }
        .msg-content { font-size: 0.85rem; color: #4b4b4b; line-height: 1.5; }

        .board-input-group { background: #f8f9fb; padding: 15px; border-radius: 15px; margin-top: 20px; }
        .inputs-top { display: flex; gap: 8px; margin-bottom: 8px; }
        input { border: 1px solid #e1e5eb; border-radius: 10px; padding: 10px; font-size: 0.85rem; }
        .btn-post { background: var(--main-blue); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        #loading { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .spinner { width: 35px; height: 35px; border: 4px solid #f0f0f0; border-top: 4px solid var(--main-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div style="margin-top:15px; font-size: 0.9rem; color: #4a90e2;">출석부 정보를 읽어오는 중...</div></div>
    
    <div class="header-container">
        <h1>📖 90일 성경통독 출석부</h1>
        <div id="tongdok-period">기간 로딩 중...</div>
    </div>

    <div class="stats-container content-box">
        <div class="stats-grid">
            <div class="stat-item"><span id="overall-percent" class="stat-value">0%</span><span class="stat-label">전체 진도</span></div>
            <div class="stat-item"><span id="total-users" class="stat-value">0</span><span class="stat-label">참여자</span></div>
            <div class="stat-item"><span id="total-checks" class="stat-value">0</span><span class="stat-label">누적 통독</span></div>
        </div>
        <div class="progress-wrapper"><div id="progress-bar" class="progress-fill"></div></div>
    </div>

    <div class="table-outer content-box">
        <div id="table-scroll-container" class="table-inner">
            <table>
                <thead><tr id="header-row"><th>이름</th></tr></thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board-container content-box">
        <div class="board-title">💬 은혜나눔</div>
        <div id="board-list"></div>
        <div class="board-input-group">
            <div class="inputs-top">
                <input type="text" id="post-name" placeholder="이름" style="width: 60px;">
                <input type="text" id="post-content" placeholder="함께 나눌 은혜의 말씀..." style="flex: 1;">
            </div>
            <button class="btn-post" onclick="postMessage()">등록하기</button>
        </div>
    </div>

    <div style="text-align:center; padding: 40px 0;">
        <button onclick="location.reload()" style="background:#eee; border:none; padding:10px 20px; border-radius:10px; font-size:0.8rem;">새로고침</button>
        <button id="admin-trigger" onclick="handleAdmin()" style="background:none; border:none; color:#ccc; font-size:0.7rem; margin-left:10px;">관리자</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let todayIdx = -1;
        let startDt = null;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.startDate) {
                    const p = data.startDate.split('-');
                    startDt = new Date(p[0], p[1]-1, p[2]);
                    calcToday(data.startDate);
                    displayPeriod(data.startDate);
                }
                renderTable(data.attendance);
                updateStats();
                renderBoard(data.messages);
                if (todayIdx > 0) setTimeout(scrollToToday, 600);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').innerText = "접속 지연중..."; }
        }

        function displayPeriod(s) {
            let curr = new Date(s), count = 0, end = new Date(s);
            while (count < 90) { if(curr.getDay() !== 0) { count++; if(count===90) end = new Date(curr); } curr.setDate(curr.getDate()+1); }
            const f = (d) => `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
            document.getElementById('tongdok-period').textContent = `${f(new Date(s))} - ${f(end)}`;
        }

        function calcToday(s) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let curr = new Date(s), count = 0;
            while (curr <= today && count < 180) { 
                if(curr.getDay() !== 0) { 
                    count++; 
                    if(curr.getTime() === today.getTime()) { todayIdx = count; break; } 
                } 
                curr.setDate(curr.getDate()+1); 
            }
        }

        function renderTable(data) {
            const h = document.getElementById('header-row'), b = document.getElementById('attendance-body');
            let dCur = startDt ? new Date(startDt) : null;
            
            for(let i=1; i<=90; i++) {
                let th = document.createElement('th');
                if(dCur) { while(dCur.getDay() === 0) dCur.setDate(dCur.getDate()+1); }
                let dStr = dCur ? `${dCur.getMonth()+1}/${dCur.getDate()}` : "";
                th.innerHTML = `<span class="day-num">${i}일</span><span class="day-date">${dStr}</span>`;
                if(i === todayIdx) th.className = 'today-cell';
                th.id = `col-${i}`;
                h.appendChild(th);
                if(dCur) dCur.setDate(dCur.getDate()+1);
            }

            let pRow = document.createElement('tr'); pRow.className='plan-row'; pRow.innerHTML="<td>본문</td>";
            for(let i=1; i<=90; i++) { 
                let td=document.createElement('td'); td.textContent=biblePlan[i]; 
                if(i===todayIdx) td.className='today-cell'; 
                pRow.appendChild(td); 
            }
            b.appendChild(pRow);

            for(let r=1; r<data.length; r++) {
                let name = data[r][0]; if(!name) continue;
                let tr = document.createElement('tr');
                let tn = document.createElement('td'); tn.textContent = name; tr.appendChild(tn);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td'); if(i===todayIdx) td.className='today-cell';
                    let cb = document.createElement('input'); cb.type='checkbox'; cb.checked=(data[r][i]==="V");
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("관리자 모드에서 가능합니다."); return; }
                        updateStats();
                        fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'attendance', name, day:i, checked:cb.checked})});
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                b.appendChild(tr);
            }
        }

        function updateStats() {
            const users = document.querySelectorAll('#attendance-body tr').length - 1;
            let checks = 0; document.querySelectorAll('input[type="checkbox"]').forEach(c => { if(c.checked) checks++; });
            const pct = Math.round((checks / (users * 90)) * 100) || 0;
            document.getElementById('total-users').textContent = users;
            document.getElementById('total-checks').textContent = checks;
            document.getElementById('overall-percent').textContent = pct + "%";
            setTimeout(() => { document.getElementById('progress-bar').style.width = pct + "%"; }, 100);
        }

        function renderBoard(msgs) {
            const l = document.getElementById('board-list'); l.innerHTML = "";
            [...msgs].reverse().slice(0, 5).forEach(m => {
                let d = document.createElement('div'); d.className='board-item';
                d.innerHTML = `<span class="msg-name">${m.name}</span><div class="msg-content">${m.content}</div>`;
                l.appendChild(d);
            });
        }

        async function postMessage() {
            const n = document.getElementById('post-name').value, c = document.getElementById('post-content').value;
            if(!n || !c) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'message', name:n, content:c})});
            location.reload();
        }

        function scrollToToday() {
            const el = document.getElementById(`col-${todayIdx}`);
            if(el) document.getElementById('table-scroll-container').scrollTo({left: el.offsetLeft - 100, behavior:'smooth'});
        }

        function handleAdmin() {
            if(!isAdmin) { if(prompt("Pass")==="9191") { localStorage.setItem('bible_admin_mode','true'); location.reload(); } }
            else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
