<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 출석부</title>
    <style>
        :root { 
            --accent: #0066FF; 
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-main: #1D1D1F;
            --text-sub: #86868B;
            --border: #E5E5E7;
            --today-bg: #F0F5FF;
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); -webkit-text-size-adjust: none; line-height: 1.5; }
        
        /* 헤더 - 극도의 심플함 */
        .header { padding: 40px 20px 20px; text-align: left; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .header p { font-size: 13px; color: var(--text-sub); margin: 6px 0 0; }
        
        /* 통계 섹션 */
        .stats-bar { display: flex; padding: 20px; gap: 30px; border-bottom: 1px solid var(--border); }
        .stat-item { display: flex; flex-direction: column; }
        .stat-item .label { font-size: 11px; color: var(--text-sub); font-weight: 600; text-transform: uppercase; }
        .stat-item .value { font-size: 18px; font-weight: 700; color: var(--accent); }

        /* 테이블 영역 - 좁은 간격 최적화 */
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; width: max-content; }
        
        /* 고정 열 */
        th:first-child, td:first-child { 
            width: 65px; position: sticky; left: 0; z-index: 10; 
            background: #FFF; font-size: 13px; font-weight: 600; 
            border-right: 1px solid var(--border);
        }
        
        /* 일차 열 (45px로 초슬림화) */
        th:not(:first-child), td:not(:first-child) { width: 45px; }
        
        th { height: 60px; font-size: 12px; font-weight: 600; color: var(--text-sub); border-bottom: 1px solid var(--border); background: #FFF; }
        .th-date { font-size: 10px; font-weight: 400; display: block; color: #BBB; margin-top: 2px; }
        
        td { height: 50px; text-align: center; border-bottom: 1px solid #F2F2F2; font-size: 14px; }
        .plan-row td { font-size: 10px; color: var(--accent); background: var(--surface); font-weight: 600; height: 40px; }

        /* 투데이(Today) 표시 - 인디케이터 & 배경 */
        .today-col { background-color: var(--today-bg) !important; position: relative; }
        th.today-col { color: var(--accent); }
        th.today-col::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); }

        /* 체크박스 - 깔끔한 블루 서클 */
        input[type="checkbox"] { 
            width: 18px; height: 18px; appearance: none; -webkit-appearance: none; 
            border: 1.5px solid var(--border); border-radius: 50%; 
            outline: none; transition: 0.2s; cursor: pointer; background: #FFF;
        }
        input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        input[type="checkbox"]:checked::after { 
            content: ''; display: block; width: 6px; height: 6px; 
            background: #FFF; border-radius: 50%; margin: 4.5px auto; 
        }

        /* 은혜나눔 게시판 */
        .board { padding: 30px 20px 80px; }
        .board-h { font-size: 15px; font-weight: 700; margin-bottom: 20px; }
        .msg-box { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #F2F2F2; }
        .msg-info { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
        .msg-text { font-size: 14px; color: #444; line-height: 1.6; }

        .form { display: flex; gap: 8px; margin-top: 25px; }
        .form input { border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 14px; outline: none; background: var(--surface); }
        .form button { background: var(--text-main); color: #FFF; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        #loading { position: fixed; inset: 0; background: #FFF; z-index: 1000; display: flex; justify-content: center; align-items: center; font-size: 13px; color: var(--text-sub); }
        
        .admin-link { display: inline-block; margin-top: 40px; font-size: 11px; color: #CCC; text-decoration: none; }
    </style>
</head>
<body>
    <div id="loading">불러오는 중...</div>
    
    <div class="header">
        <h1>90일 성경통독 출석부</h1>
        <p id="period-info">데이터를 동기화하고 있습니다.</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span class="label">Progress</span><span id="overall-percent" class="value">0%</span></div>
        <div class="stat-item"><span class="label">People</span><span id="total-users" class="value">0</span></div>
        <div class="stat-item"><span class="label">Total</span><span id="total-checks" class="value">0</span></div>
    </div>

    <div class="table-container">
        <div id="scroll-box">
            <table>
                <thead><tr id="header-row"><th>이름</th></tr></thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board">
        <div class="board-h">오늘의 은혜나눔</div>
        <div id="board-list"></div>
        <div class="form">
            <input type="text" id="post-name" placeholder="이름" style="width: 60px;">
            <input type="text" id="post-content" placeholder="말씀을 통해 받은 은혜..." style="flex: 1;">
            <button onclick="postMessage()">등록</button>
        </div>
        <a href="#" class="admin-link" onclick="handleAdmin()">Admin Setting</a>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let todayDayIndex = -1;
        let startDtObj = null;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.startDate) {
                    const p = data.startDate.split('-');
                    startDtObj = new Date(p[0], p[1]-1, p[2]);
                    // 정확한 오늘 날짜 계산
                    calcTodayIdx(data.startDate);
                    setPeriod(data.startDate);
                }
                render(data.attendance);
                updateStats();
                renderBoard(data.messages);
                if (todayDayIndex > 0) setTimeout(autoScroll, 600);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').innerText = "Load Error"; }
        }

        function setPeriod(s) {
            let start = new Date(s), curr = new Date(s), count = 0, end = new Date(s);
            while (count < 90) { if(curr.getDay() !== 0) { count++; if(count===90) end = new Date(curr); } curr.setDate(curr.getDate()+1); }
            const f = (d) => `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
            document.getElementById('period-info').textContent = `${f(start)} — ${f(end)}`;
        }

        function calcTodayIdx(s) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let curr = new Date(s), count = 0;
            while (curr <= today && count < 180) { 
                if(curr.getDay() !== 0) { 
                    count++; 
                    if(curr.getTime() === today.getTime()) { todayDayIndex = count; break; } 
                } 
                curr.setDate(curr.getDate()+1); 
            }
        }

        function render(data) {
            const h = document.getElementById('header-row'), b = document.getElementById('attendance-body');
            let dCur = startDtObj ? new Date(startDtObj) : null;
            
            for(let i=1; i<=90; i++) {
                let th = document.createElement('th');
                if(dCur) { while(dCur.getDay() === 0) dCur.setDate(dCur.getDate()+1); }
                let dStr = dCur ? `${dCur.getMonth()+1}/${dCur.getDate()}` : "";
                th.innerHTML = `${i}일<span class="th-date">${dStr}</span>`;
                if(i === todayDayIndex) th.className = 'today-col';
                th.id = `day-${i}`;
                h.appendChild(th);
                if(dCur) dCur.setDate(dCur.getDate()+1);
            }

            let pTr = document.createElement('tr'); pTr.className='plan-row'; pTr.innerHTML="<td>본문</td>";
            for(let i=1; i<=90; i++) { 
                let td=document.createElement('td'); td.textContent=biblePlan[i]; 
                if(i===todayDayIndex) td.className='today-col'; 
                pTr.appendChild(td); 
            }
            b.appendChild(pTr);

            for(let r=1; r<data.length; r++) {
                let name = data[r][0]; if(!name) continue;
                let tr = document.createElement('tr');
                let tn = document.createElement('td'); tn.textContent = name; tr.appendChild(tn);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td'); if(i===todayDayIndex) td.className='today-col';
                    let cb = document.createElement('input'); cb.type='checkbox'; cb.checked=(data[r][i]==="V");
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("관리자 모드에서 수정 가능합니다."); return; }
                        updateStats();
                        fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'attendance', name, day:i, checked:cb.checked})});
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                b.appendChild(tr);
            }
        }

        function updateStats() {
            const users = document.querySelectorAll('#attendance-body tr').length - 1;
            let checks = 0; document.querySelectorAll('input[type="checkbox"]').forEach(c => { if(c.checked) checks++; });
            const pct = Math.round((checks / (users * 90)) * 100) || 0;
            document.getElementById('total-users').textContent = users;
            document.getElementById('total-checks').textContent = checks;
            document.getElementById('overall-percent').textContent = pct + "%";
        }

        function renderBoard(msgs) {
            const l = document.getElementById('board-list'); l.innerHTML = "";
            [...msgs].reverse().slice(0, 5).forEach(m => {
                let d = document.createElement('div'); d.className='msg-box';
                d.innerHTML = `<div class="msg-info">${m.name}</div><div class="msg-text">${m.content}</div>`;
                l.appendChild(d);
            });
        }

        async function postMessage() {
            const n = document.getElementById('post-name').value, c = document.getElementById('post-content').value;
            if(!n || !c) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'message', name:n, content:c})});
            location.reload();
        }

        function autoScroll() {
            const el = document.getElementById(`day-${todayDayIndex}`);
            if(el) document.getElementById('scroll-box').scrollTo({left: el.offsetLeft - 80, behavior:'smooth'});
        }

        function handleAdmin() {
            if(!isAdmin) { if(prompt("Key")==="9191") { localStorage.setItem('bible_admin_mode','true'); location.reload(); } }
            else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
