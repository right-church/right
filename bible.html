<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 출석부</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f4f7f6;
            --border-color: #ddd;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: #333;
            -webkit-text-size-adjust: none;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #2c3e50;
            margin: 15px 0;
        }

        /* 모바일 최적화 컨테이너 */
        .table-container {
            width: 100%;
            max-height: 75vh; 
            overflow: auto; 
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            -webkit-overflow-scrolling: touch; /* 아이폰 부드러운 스크롤 */
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        /* 상단 헤더 고정 (이름 줄) */
        th {
            position: sticky;
            top: 0;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 8px;
            font-size: 14px;
            z-index: 100;
            border-bottom: 2px solid #2980b9;
            white-space: nowrap;
        }

        /* 좌측 일차 고정 (스크롤해도 일차가 보이게 함) */
        td:first-child, th:first-child {
            position: sticky;
            left: 0;
            z-index: 110;
            background-color: #fff;
            font-weight: bold;
            border-right: 2px solid var(--primary-color);
            min-width: 60px;
        }

        th:first-child {
            background-color: var(--primary-color);
            z-index: 120;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 14px;
            background-color: #fff;
        }

        /* 입력칸 모바일 최적화 */
        input[type="text"] {
            width: 90px;
            padding: 8px 4px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            -webkit-appearance: none; /* iOS 기본 스타일 제거 */
        }

        /* 체크박스 크기 키움 (터치 편의성) */
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary-color); /* 체크박스 색상 변경 */
        }

        tr:nth-child(even) td {
            background-color: #fcfdfe;
        }

        .reset-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 24px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

                    <th>김사라</th>
                    <th>김성은</th>
                    <th>김정동</th>
                    <th>김하정</th>
                    <th>박금희</th>
                    <th>유진헌</th>
                    <th>이영숙</th>
                    <th>한진경</th>
                </tr>
            </thead>
            <tbody id="attendance-body"></tbody>
        </table>
    </div>
