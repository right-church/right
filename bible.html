<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 출석부 (가로형)</title>
    <style>
        :root {
            --main-blue: #3498db;
            --dark-blue: #2c3e50;
            --light-bg: #f4f7f6;
            --border-color: #ddd;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 10px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: var(--dark-blue);
            font-size: 1.4rem;
            margin: 15px 0;
        }

        .table-outer {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .table-inner {
            max-height: 80vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            text-align: center;
        }

        /* 첫 번째 열(이름/구분) 고정 */
        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            z-index: 110;
            min-width: 80px;
            background-color: #eee;
            border-right: 2px solid var(--main-blue);
            font-weight: bold;
        }

        /* 헤더 스타일 */
        th {
            background-color: var(--main-blue);
            color: white;
            padding: 10px 15px;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #2980b9;
            white-space: nowrap;
        }

        th:first-child { z-index: 120; }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: #fff;
            min-width: 60px;
        }

        /* 읽을 말씀 행 배경색 차별화 */
        .plan-row td {
            background-color: #f0f8ff;
            font-size: 0.75rem;
            color: #2980b9;
            font-weight: bold;
        }

        tr:nth-child(even) td:not(:first-child) { background-color: #fcfdfe; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--main-blue);
            vertical-align: middle;
        }

        .footer-action { text-align: center; margin-top: 20px; }
        .reset-btn {
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

            </table>
        </div>
    </div>

    </div>
