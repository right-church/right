<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>90일 성경통독 출석부</title>
    <style>
        :root {
            --main-blue: #3498db;
            --dark-blue: #2c3e50;
            --light-bg: #f4f7f6;
            --border-color: #ddd;
            --lock-color: #95a5a6;
            --admin-color: #27ae60;
            --highlight-yellow: #fff9c4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            text-align: center;
            color: var(--dark-blue);
            font-size: 1.4rem;
            margin: 10px 0 5px;
        }

        .status-bar {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .status-locked { color: var(--lock-color); }
        .status-admin { color: var(--admin-color); }

        .table-outer {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-inner {
            max-height: 70vh;
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        th:first-child, td:first-child {
            position: -webkit-sticky;
            position: sticky;
            left: 0;
            z-index: 10;
            min-width: 90px;
            background-color: #f8f9fa;
            border-right: 2px solid var(--main-blue);
            font-weight: bold;
        }

        th {
            background-color: var(--main-blue);
            color: white;
            padding: 12px 10px;
            font-size: 0.85rem;
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 5;
            border-bottom: 2px solid #2980b9;
            white-space: nowrap;
        }

        th:first-child { z-index: 15; background-color: var(--main-blue); }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: #fff;
            text-align: center;
            min-width: 65px;
            transition: background-color 0.2s;
        }

        td.checked-cell {
            background-color: var(--highlight-yellow) !important;
        }

        .plan-row td {
            background-color: #ebf5fb;
            font-size: 0.75rem;
            color: #2980b9;
            font-weight: bold;
            white-space: nowrap;
        }

        /* 체크박스 스타일 강제 강화 */
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--main-blue) !important; 
            -webkit-appearance: checkbox;
            vertical-align: middle;
            opacity: 1 !important;
        }

        /* 조회 모드일 때 클릭 커서 변경 */
        input.read-only {
            cursor: default;
        }

        .footer-action { 
            text-align: center; 
            margin-top: 20px; 
            padding-bottom: 30px; 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center; 
            gap: 8px; 
        }
        
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            -webkit-appearance: none;
            color: white;
            font-size: 0.9rem;
        }

        .admin-btn { background-color: var(--admin-color); }
        .reset-btn { background-color: #e74c3c; }
        .lock-btn { background-color: var(--lock-color); }
        .edit-btn { background-color: var(--dark-blue); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>📖 90일 성경통독 출석부</h1>
    <div id="status-display" class="status-bar status-locked">🔒 현재: 조회 모드 (수정 불가)</div>
    
    <div class="table-outer">
        <div class="table-inner">
            <table id="bible-table">
                <thead>
                    <tr id="header-row">
                        <th>구분 \ 일차</th>
                    </tr>
                </thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-action">
        <button id="toggle-admin-btn" class="admin-btn" onclick="toggleAdmin()">관리자 모드 활성화</button>
        <button id="edit-members-btn" class="edit-btn hidden" onclick="editMembers()">인원 설정</button>
        <button id="reset-data-btn" class="reset-btn hidden" onclick="secureReset()">기록 초기화</button>
    </div>

    <script>
        const defaultMembers = ["통독1", "통독2", "통독3", "통독4", "통독5"];
        const biblePlan = {
            1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29",
            7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5",
            13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1",
            19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3",
            25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28",
            31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38",
            37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75",
            43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4",
            49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32",
            55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45",
            61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7",
            67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19",
            73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9",
            79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3",
            85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22"
        };

        let isAdmin = false;

        function getMembers() {
            const saved = localStorage.getItem('bible-members');
            return saved ? JSON.parse(saved) : defaultMembers;
        }

        function render() {
            const headerRow = document.getElementById('header-row');
            const tbody = document.getElementById('attendance-body');
            const currentMembers = getMembers();

            headerRow.innerHTML = "<th>구분 \\ 일차</th>";
            tbody.innerHTML = ""; 

            for (let i = 1; i <= 90; i++) {
                const th = document.createElement('th');
                th.textContent = i + '일';
                headerRow.appendChild(th);
            }

            const planRow = document.createElement('tr');
            planRow.className = 'plan-row';
            planRow.innerHTML = "<td>읽을 말씀</td>";
            for (let i = 1; i <= 90; i++) {
                const td = document.createElement('td');
                td.textContent = biblePlan[i];
                planRow.appendChild(td);
            }
            tbody.appendChild(planRow);

            currentMembers.forEach(name => {
                const tr = document.createElement('tr');
                const tdName = document.createElement('td');
                tdName.textContent = name;
                tr.appendChild(tdName);

                for (let i = 1; i <= 90; i++) {
                    const td = document.createElement('td');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'attendance-cb' + (isAdmin ? '' : ' read-only');
                    
                    const key = `check-${i}-${name}`;
                    const isChecked = localStorage.getItem(key) === 'true';
                    
                    cb.checked = isChecked;
                    if(isChecked) td.classList.add('checked-cell');

                    // [수정] disabled 대신 클릭 이벤트를 제어하여 선명도 유지
                    cb.onclick = (e) => {
                        if (!isAdmin) {
                            return false; // 관리자가 아니면 변경 방지
                        }
                        // 관리자일 때만 저장 로직 실행
                        localStorage.setItem(key, e.target.checked);
                        if(e.target.checked) td.classList.add('checked-cell');
                        else td.classList.remove('checked-cell');
                    };

                    td.appendChild(cb);
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        function toggleAdmin() {
            if (!isAdmin) {
                const password = prompt("관리자 비밀번호를 입력하세요.");
                if (password === "9191") {
                    isAdmin = true;
                    updateAdminUI();
                } else if (password !== null) alert("비밀번호가 틀렸습니다.");
            } else {
                isAdmin = false;
                updateAdminUI();
            }
        }

        function updateAdminUI() {
            const statusDisp = document.getElementById('status-display');
            const adminToggleBtn = document.getElementById('toggle-admin-btn');
            const editBtn = document.getElementById('edit-members-btn');
            const resetBtn = document.getElementById('reset-data-btn');

            if (isAdmin) {
                statusDisp.textContent = "🔓 현재: 관리자 모드 (수정 가능)";
                statusDisp.className = "status-bar status-admin";
                adminToggleBtn.textContent = "관리자 모드 종료";
                adminToggleBtn.className = "lock-btn";
                editBtn.classList.remove('hidden');
                resetBtn.classList.remove('hidden');
            } else {
                statusDisp.textContent = "🔒 현재: 조회 모드 (수정 불가)";
                statusDisp.className = "status-bar status-locked";
                adminToggleBtn.textContent = "관리자 모드 활성화";
                adminToggleBtn.className = "admin-btn";
                editBtn.classList.add('hidden');
                resetBtn.classList.add('hidden');
            }
            // 전체 다시 렌더링하여 이벤트 바인딩 갱신
            render();
        }

        function editMembers() {
            const current = getMembers().join(", ");
            const newNames = prompt("통독 인원 이름을 쉼표(,)로 구분해 입력하세요.\n(예: 김사라, 박민수, 이영숙)", current);
            
            if (newNames !== null) {
                const nameArray = newNames.split(",")
                                          .map(n => n.trim())
                                          .filter(n => n.length > 0);
                if (nameArray.length > 0) {
                    localStorage.setItem('bible-members', JSON.stringify(nameArray));
                    render();
                    updateAdminUI();
                } else {
                    alert("최소 한 명 이상의 이름을 입력해야 합니다.");
                }
            }
        }

        function secureReset() {
            const password = prompt("모든 데이터를 삭제하려면 비밀번호를 한 번 더 입력하세요.");
            if (password === "9191") {
                if (confirm("🚨 경고: 모든 체크 기록과 명단이 초기화됩니다. 정말 진행할까요?")) {
                    localStorage.clear();
                    location.reload();
                }
            } else if (password !== null) alert("비밀번호가 틀렸습니다.");
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
