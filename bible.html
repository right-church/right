<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90일 성경통독 출석부 (가로형)</title>
    <style>
        :root {
            --main-blue: #3498db;
            --dark-blue: #2c3e50;
            --light-bg: #f4f7f6;
            --border-color: #ddd;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 10px;
        }

        h1 {
            text-align: center;
            color: var(--dark-blue);
            font-size: 1.4rem;
        }

        /* 표가 들어갈 컨테이너 */
        .table-outer {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .table-inner {
            max-height: 80vh;
            overflow: auto; /* 가로, 세로 스크롤 활성화 */
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed; /* 너비 고정으로 렌더링 오류 방지 */
            width: auto; 
        }

        /* 첫 번째 열(이름) 고정 */
        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            z-index: 110;
            width: 100px; /* 이름 칸 너비 */
            background-color: #f8f9fa;
            border-right: 2px solid var(--main-blue);
            font-weight: bold;
            text-align: center;
        }

        /* 헤더(날짜) 고정 */
        th {
            background-color: var(--main-blue);
            color: white;
            padding: 10px 0;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 100;
            width: 70px; /* 각 날짜 칸 너비 */
            border-bottom: 2px solid #2980b9;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        th:first-child { z-index: 120; background-color: var(--main-blue); }

        td {
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: #fff;
            text-align: center;
            height: 40px;
        }

        /* 읽을 말씀 행 스타일 */
        .plan-row td {
            background-color: #ebf5fb;
            font-size: 0.7rem;
            color: #2e86de;
            font-weight: bold;
            line-height: 1.2;
            word-break: break-all;
            padding: 5px 2px;
        }

        tr:hover td { background-color: #f1f1f1; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--main-blue);
        }

        .footer-action { text-align: center; margin-top: 20px; }
        .reset-btn {
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>📖 90일 성경통독 (가로형)</h1>
    
    <div class="table-outer">
        <div class="table-inner">
            <table id="bible-table">
                <thead>
                    <tr id="header-row">
                        <th>구분 \ 일차</th>
                        </tr>
                </thead>
                <tbody id="attendance-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="footer-action">
        <button class="reset-btn" onclick="resetData()">전체 기록 초기화</button>
    </div>

    <script>
        const members = ["김사라", "김성은", "김정동", "김하정", "박금희", "유진헌", "이영숙", "한진경"];
        const biblePlan = {
            1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29",
            7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5",
            13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1",
            19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3",
            25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28",
            31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38",
            37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75",
            43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4",
            49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32",
            55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45",
            61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7",
            67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19",
            73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9",
            79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3",
            85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22"
        };

        const headerRow = document.getElementById('header-row');
        const attendanceBody = document.getElementById('attendance-body');

        function init() {
            // 1. 헤더 (1-90일) 생성
            for (let i = 1; i <= 90; i++) {
                const th = document.createElement('th');
                th.textContent = i + '일';
                headerRow.appendChild(th);
            }

            // 2. 말씀 행 생성
            const planRow = document.createElement('tr');
            planRow.className = 'plan-row';
            const tdTitle = document.createElement('td');
            tdTitle.textContent = "읽을 말씀";
            planRow.appendChild(tdTitle);

            for (let i = 1; i <= 90; i++) {
                const td = document.createElement('td');
                td.textContent = biblePlan[i];
                planRow.appendChild(td);
            }
            attendanceBody.appendChild(planRow);

            // 3. 멤버별 행 생성
            members.forEach(name => {
                const tr = document.createElement('tr');
                const tdName = document.createElement('td');
                tdName.textContent = name;
                tr.appendChild(tdName);

                for (let i = 1; i <= 90; i++) {
                    const td = document.createElement('td');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    const key = `check-${i}-${name}`;
                    cb.checked = localStorage.getItem(key) === 'true';
                    cb.onchange = (e) => localStorage.setItem(key, e.target.checked);
                    td.appendChild(cb);
                    tr.appendChild(td);
                }
                attendanceBody.appendChild(tr);
            });
        }

        function resetData() {
            if (confirm("모든 체크 기록이 초기화됩니다. 정말 삭제할까요?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 페이지 로드 시 즉시 실행
        window.onload = init;
    </script>
</body>
</html>
