<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독</title>
    <style>
        :root { --main-blue: #3498db; --dark-blue: #2c3e50; --light-bg: #f8f9fa; --border-color: #eee; --admin-color: #27ae60; --highlight-yellow: #fffde7; --today-bg: #e3f2fd; }
        body { font-family: -apple-system, sans-serif; background-color: var(--light-bg); margin: 0; padding: 5px 0; -webkit-text-size-adjust: none; }
        h1 { text-align: center; color: var(--dark-blue); font-size: 1rem; margin: 8px 0; }
        
        .content-box { width: 96%; margin: 0 auto 10px auto; }

        /* 통계 섹션 (슬림) */
        .stats-container { display: flex; background: white; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); }
        .stat-item { text-align: center; flex: 1; border-right: 1px solid #f0f0f0; }
        .stat-item:last-child { border-right: none; }
        .stat-value { font-size: 0.9rem; font-weight: bold; color: var(--main-blue); display: block; }
        .stat-label { font-size: 0.6rem; color: #95a5a6; }

        /* 테이블 (모바일 최적화) */
        .table-outer { background: #fff; border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
        .table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th, td { padding: 0; border-bottom: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; text-align: center; vertical-align: middle; height: 36px; }
        
        /* 이름 칸 고정 (너비 축소) */
        th:first-child, td:first-child { width: 55px; position: sticky; left: 0; z-index: 10; background-color: #fcfcfc; border-right: 1.5px solid var(--main-blue); font-size: 0.75rem; font-weight: bold; }
        th:not(:first-child), td:not(:first-child) { width: 42px; }

        th { background-color: var(--main-blue); color: white; font-size: 0.6rem; height: 28px; }
        .plan-row td { background-color: #f1f9ff; color: #2980b9; font-size: 0.52rem; letter-spacing: -0.5px; line-height: 1; }
        input[type="checkbox"] { width: 17px; height: 17px; margin: 0; vertical-align: middle; }
        .today-cell { background-color: var(--today-bg) !important; box-shadow: inset 0 0 0 1.5px var(--main-blue); }
        td.checked-cell { background-color: var(--highlight-yellow) !important; }

        /* 게시판 (이름, 내용, 좋아요 한 줄 배치) */
        .board-container { background: #fff; border-radius: 8px; padding: 10px; border: 1px solid var(--border-color); }
        .board-title { font-size: 0.85rem; font-weight: bold; color: var(--dark-blue); margin-bottom: 8px; }
        
        .board-item { 
            display: flex; 
            align-items: center; 
            padding: 6px 0; 
            border-bottom: 1px solid #f5f5f5; 
            gap: 8px;
            font-size: 0.8rem;
        }
        .board-item:last-child { border-bottom: none; }
        
        .msg-name { font-weight: bold; color: var(--main-blue); min-width: 45px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-content { flex-grow: 1; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        
        .btn-like { background: #fff1f1; border: 1px solid #ffcccc; color: #ff7675; padding: 1px 6px; border-radius: 10px; font-size: 0.65rem; cursor: pointer; }
        .btn-delete { background: #eee; border: none; padding: 2px 5px; border-radius: 4px; font-size: 0.6rem; color: #999; }

        /* 입력창 슬림화 */
        .board-input-group { display: flex; gap: 4px; margin-top: 10px; }
        #post-name { width: 50px; flex-shrink: 0; }
        #post-content { flex-grow: 1; }
        .board-input-group input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.8rem; }
        .btn-post { background: var(--main-blue); color: white; border: none; padding: 0 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }

        .footer { margin: 15px 0 30px; display: flex; justify-content: center; gap: 6px; }
        .nav-btn { padding: 6px 10px; border-radius: 4px; font-size: 0.7rem; color: white; border: none; }
        .btn-admin { background: var(--admin-color); }
        .btn-refresh { background: #95a5a6; }
    </style>
</head>
<body>
    <div id="loading">⏳ 연결 중...</div>
    <h1>📖 90일 성경통독</h1>

    <div class="stats-container content-box">
        <div class="stat-item"><span id="total-users" class="stat-value">0</span><span class="stat-label">참여자</span></div>
        <div class="stat-item"><span id="total-checks" class="stat-value">0</span><span class="stat-label">누적읽기</span></div>
        <div class="stat-item"><span id="overall-percent" class="stat-value">0%</span><span class="stat-label">진행률</span></div>
    </div>

    <div class="table-outer content-box">
        <div id="table-scroll-container" class="table-inner">
            <table>
                <thead><tr id="header-row"><th>이름\일차</th></tr></thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board-container content-box">
        <div class="board-title">🙏 기도제목 & 은혜나눔</div>
        <div id="board-list"></div>
        <div class="board-input-group">
            <input type="text" id="post-name" placeholder="이름">
            <input type="text" id="post-content" placeholder="내용을 입력하세요.">
            <button class="btn-post" onclick="postMessage()">등록</button>
        </div>
    </div>
    
    <div class="footer">
        <button id="admin-btn" class="nav-btn btn-admin" onclick="handleAdmin()">관리자</button>
        <button id="set-date-btn" class="nav-btn btn-admin" style="display:none;" onclick="setStartDate()">시작일</button>
        <button class="nav-btn btn-refresh" onclick="location.reload()">새로고침</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTWLJGSR5TemSU1H_6Af_jf0HYfDE3vsn9r-wiMZ4A7RVVjQii4IfN-A1wRpyJmu9L/exec";
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let todayDayIndex = -1;

        async function init() {
            if(isAdmin) { document.getElementById('admin-btn').textContent="로그아웃"; document.getElementById('set-date-btn').style.display="inline"; }
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.startDate) calculateTodayIndex(new Date(data.startDate));
                render(data.attendance);
                calculateStats(data.attendance);
                renderBoard(data.messages);
                if (todayDayIndex > 0) setTimeout(scrollToToday, 500);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').textContent = "오류 발생"; }
        }

        function calculateTodayIndex(start) {
            const today = new Date(); today.setHours(0,0,0,0);
            let current = new Date(start); current.setHours(0,0,0,0);
            let count = 0;
            while (count < 90) {
                if (current.getDay() !== 0) { count++; if (current.getTime() === today.getTime()) { todayDayIndex = count; break; } }
                if (current > today) break;
                current.setDate(current.getDate() + 1);
            }
        }

        function render(sheetData) {
            const hRow = document.getElementById('header-row');
            const tbody = document.getElementById('attendance-body');
            for(let i=1; i<=90; i++) {
                let th = document.createElement('th'); th.innerHTML = `${i}일`;
                if(i === todayDayIndex) th.className = 'today-cell';
                th.id = `col-head-${i}`; hRow.appendChild(th);
            }
            // 생략: 성경 범위 표기 및 데이터 렌더링 (기존 로직과 동일)
            // ... (기존 render 함수 내용 유지) ...
        }

        // 기도제목 목록 - 한 줄 스타일 적용
        function renderBoard(messages) {
            const list = document.getElementById('board-list');
            list.innerHTML = "";
            messages.reverse().slice(0, 10).forEach(m => {
                const item = document.createElement('div');
                item.className = 'board-item';
                item.innerHTML = `
                    <span class="msg-name">${m.name}</span>
                    <span class="msg-content">${m.content}</span>
                    <div class="msg-actions">
                        <button class="btn-like" onclick="likeMsg('${m.id}', this)">❤️ ${m.likes}</button>
                        ${isAdmin ? `<button class="btn-delete" onclick="deleteMsg('${m.id}')">✕</button>` : ''}
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // ... (기존 나머지 함수들: scrollToToday, postMessage, likeMsg, deleteMsg, handleAdmin 등 동일) ...
    </script>
</body>
</html>
