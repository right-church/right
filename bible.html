<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 출석부</title>
    <style>
        :root {
            --main-blue: #3498db;
            --dark-blue: #2c3e50;
            --light-bg: #f4f7f6;
            --border-color: #ddd;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 15px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: var(--dark-blue);
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .table-outer {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .table-inner {
            max-height: 70vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: center;
        }

        th {
            background-color: var(--main-blue);
            color: white;
            padding: 12px 8px;
            font-size: 0.9rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #2980b9;
            white-space: nowrap;
        }

        /* 일차와 읽을 말씀 칸 너비 축소 및 고정 */
        td:first-child, th:first-child {
            position: sticky;
            left: 0;
            z-index: 110;
            min-width: 55px; /* 너비 축소 */
            background-color: #fff;
            border-right: 1px solid var(--border-color);
        }

        /* 읽을 말씀 칸 설정 */
        td:nth-child(2), th:nth-child(2) {
            min-width: 90px; /* 너비 축소 */
        }

        th:first-child, th:nth-child(2) {
            background-color: var(--main-blue);
        }

        /* 일차 열 강조선 */
        td:first-child {
            border-right: 2px solid var(--main-blue);
        }

        td {
            padding: 8px 5px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: #fff;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        tr:nth-child(even) td {
            background-color: #fcfdfe;
        }

        /* 입력창 크기 최적화 */
        input[type="text"] {
            width: 85px; /* 입력칸 더 좁게 */
            padding: 6px 2px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: center;
            outline-color: var(--main-blue);
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--main-blue);
            vertical-align: middle;
        }

        .footer-action {
            text-align: center;
            margin-top: 25px;
        }

        .reset-btn {
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>

                        <th>한진경</th>
                    </tr>
                </thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    </div>
