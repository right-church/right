<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>90일 성경통독 실시간 출석부</title>
    <style>
        :root { --main-blue: #3498db; --dark-blue: #2c3e50; --light-bg: #f4f7f6; --border-color: #ddd; --admin-color: #27ae60; --highlight-yellow: #fff9c4; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background-color: var(--light-bg); margin: 0; padding: 10px; }
        h1 { text-align: center; color: var(--dark-blue); font-size: 1.5rem; margin: 20px 0; }
        
        /* 테이블 레이아웃 */
        .table-outer { max-width: 1200px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid var(--border-color); overflow: hidden; }
        .table-inner { max-height: 75vh; overflow: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); text-align: center; min-width: 70px; }
        
        /* 첫 번째 열(이름) 고정 */
        th:first-child, td:first-child { position: sticky; left: 0; z-index: 10; background-color: #f8f9fa; border-right: 2px solid var(--main-blue); font-weight: bold; }
        
        /* 첫 번째 행(날짜) 고정 */
        th { background-color: var(--main-blue); color: white; position: sticky; top: 0; z-index: 5; white-space: nowrap; }
        
        /* 체크된 셀 배경색 */
        td.checked-cell { background-color: var(--highlight-yellow) !important; }
        
        /* 체크박스 스타일 */
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--main-blue); cursor: pointer; }
        
        /* 하단 버튼 구역 */
        .footer { text-align: center; margin-top: 20px; padding-bottom: 40px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin: 5px; font-size: 1rem; transition: 0.2s; }
        .btn-admin { background-color: var(--admin-color); }
        .btn-refresh { background-color: #95a5a6; }
        button:active { opacity: 0.7; }

        /* 로딩 화면 */
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:100; font-weight:bold; color: var(--dark-blue); }
    </style>
</head>
<body>
    <div id="loading" class="loading">⏳ 데이터를 연결 중입니다...</div>
    <h1>📖 90일 성경통독 출석부</h1>
    
    <div class="table-outer">
        <div class="table-inner">
            <table>
                <thead><tr id="header-row"><th>이름 \ 일차</th></tr></thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <button id="admin-btn" class="btn-admin" onclick="toggleAdmin()">관리자 모드 활성화</button>
        <button class="btn-refresh" onclick="location.reload()">🔄 새로고침</button>
    </div>

    <script>
        // 발급받으신 주소를 성공적으로 연결했습니다.
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjz4t-fQ7Er58KcjStP812ThiglBruPCrjaG7wQm0TYKnYjEgTZscJwntIHlPjXCBt/exec";
        let isAdmin = false;

        // 시작 시 데이터 불러오기
        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                render(data);
            } catch (e) { 
                console.error(e);
                alert("연동에 실패했습니다. 구글 시트 배포 설정을 확인하세요."); 
            }
            document.getElementById('loading').style.display = 'none';
        }

        // 테이블 그리기
        function render(sheetData) {
            const hRow = document.getElementById('header-row');
            const tbody = document.getElementById('attendance-body');
            
            // 1. 날짜 헤더 생성 (1~90일)
            for(let i=1; i<=90; i++) {
                let th = document.createElement('th');
                th.textContent = i + '일';
                hRow.appendChild(th);
            }

            // 2. 인원별 행 생성 (sheetData의 0번 인덱스는 헤더이므로 1번부터 시작)
            for(let r=1; r<sheetData.length; r++) {
                let name = sheetData[r][0]; // A열: 이름
                if(!name) continue;

                let tr = document.createElement('tr');
                let tdName = document.createElement('td');
                tdName.textContent = name;
                tr.appendChild(tdName);

                // 1일차부터 90일차까지 칸 생성
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td');
                    let cb = document.createElement('input');
                    cb.type = 'checkbox';
                    
                    // 구글 시트에 "V"가 있으면 체크 상태로 표시
                    cb.checked = (sheetData[r][i] === "V");
                    if(cb.checked) td.className = 'checked-cell';

                    // 클릭 이벤트
                    cb.onclick = async (e) => {
                        if(!isAdmin) { 
                            e.preventDefault(); 
                            alert("관리자 모드에서만 수정 가능합니다. 하단 버튼을 눌러주세요."); 
                            return; 
                        }
                        
                        // 즉시 화면 반영 (시각적 피드백)
                        td.className = cb.checked ? 'checked-cell' : '';
                        
                        // 구글 시트로 데이터 전송
                        try {
                            await fetch(SCRIPT_URL, {
                                method: 'POST',
                                body: JSON.stringify({name: name, day: i, checked: cb.checked})
                            });
                        } catch (err) {
                            alert("데이터 저장 중 오류가 발생했습니다.");
                        }
                    };
                    
                    td.appendChild(cb);
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        // 관리자 모드 토글
        function toggleAdmin() {
            let pw = prompt("관리자 비밀번호를 입력하세요.");
            if(pw === "9191") {
                isAdmin = true;
                document.getElementById('admin-btn').textContent = "🔓 관리자 모드 작동 중";
                document.getElementById('admin-btn').style.backgroundColor = "#e67e22"; // 주황색으로 변경
                alert("이제 자유롭게 체크/해제가 가능합니다.");
            } else if(pw !== null) {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        // 실행
        init();
    </script>
</body>
</html>
