<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 출석부</title>
    <style>
        :root { --main-blue: #3498db; --dark-blue: #2c3e50; --light-bg: #f4f7f6; --border-color: #ddd; --admin-color: #27ae60; --highlight-yellow: #fff9c4; --container-width: 95%; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background-color: var(--light-bg); margin: 0; padding: 10px 0; }
        h1 { text-align: center; color: var(--dark-blue); font-size: 1.2rem; margin: 10px 0 20px 0; }
        
        .content-box { max-width: var(--container-width); margin: 0 auto 15px auto; width: var(--container-width); }

        /* 통계 및 진행바 */
        .stats-container { display: flex; justify-content: space-around; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); box-sizing: border-box; }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--main-blue); display: block; }
        .stat-label { font-size: 0.7rem; color: #7f8c8d; }
        .progress-section { text-align: center; margin-bottom: 25px; }
        .progress-bg { background: #eee; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #3498db, #2ecc71); height: 100%; width: 0%; transition: width 1s; }

        /* 출석부 표 */
        .table-outer { background: #fff; border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); box-sizing: border-box; }
        .table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th, td { padding: 0; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); text-align: center; vertical-align: middle; height: 46px; }
        th { background-color: var(--main-blue); color: white; position: sticky; top: 0; z-index: 30; font-size: 0.75rem; }
        th:first-child, td:first-child { width: 70px; position: sticky; left: 0; z-index: 31; background-color: #f8f9fa; border-right: 2px solid var(--main-blue); font-weight: bold; }
        th:first-child { z-index: 40; }
        th:not(:first-child), td:not(:first-child) { width: 50px; min-width: 50px; }
        .plan-row td { background-color: #ebf5fb !important; color: #2980b9; font-size: 0.65rem; line-height: 1.2; font-weight: bold; padding: 0 2px; }
        td.checked-cell { background-color: var(--highlight-yellow) !important; }
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--main-blue); cursor: pointer; }

        /* 기도 게시판 */
        .board-container { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); box-sizing: border-box; }
        .board-title { font-size: 1rem; font-weight: bold; color: var(--dark-blue); margin-bottom: 12px; }
        .board-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.88rem; border-left: 4px solid var(--main-blue); position: relative; line-height: 1.6; transition: all 0.2s; }
        .btn-delete { background: #ff7675; color: white; border: none; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; float: right; margin-left: 10px; opacity: 0.8; }
        
        .btn-like { display: inline-flex; align-items: center; gap: 3px; background: white; border: 1px solid #ffb3b3; color: #ff7675; padding: 1px 7px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; margin-left: 8px; vertical-align: middle; font-weight: bold; transition: 0.2s; }
        .btn-like:active { transform: scale(1.2); }

        .board-input-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .board-input-group input, .board-input-group textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; -webkit-appearance: none; }
        .btn-post { background: var(--main-blue); color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        .footer { text-align: center; margin: 30px 0 50px; display: flex; justify-content: center; gap: 10px; }
        button.nav-btn { min-width: 130px; height: 48px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; font-size: 0.9rem; }
        .btn-admin { background-color: var(--admin-color); }
        .btn-logout { background-color: #e67e22; }
        .btn-refresh { background-color: #95a5a6; }
        
        /* 로딩 애니메이션 개선 */
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.85); display:flex; justify-content:center; align-items:center; z-index:1000; font-weight:bold; color: var(--dark-blue); transition: opacity 0.3s; }
    </style>
</head>
<body>
    <div id="loading">⏳ 올바른 데이터에 연결 중...</div>
    <h1>📖 90일 성경통독 출석부</h1>

    <div class="stats-container content-box">
        <div class="stat-item"><span id="total-users" class="stat-value">0</span><span class="stat-label">참여자</span></div>
        <div class="stat-item"><span id="total-checks" class="stat-value">0</span><span class="stat-label">누적 읽기</span></div>
        <div class="stat-item"><span id="overall-percent" class="stat-value">0%</span><span class="stat-label">완독률</span></div>
    </div>
    
    <div class="progress-section content-box">
        <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
    </div>

    <div class="table-outer content-box">
        <div class="table-inner">
            <table>
                <thead><tr id="header-row"><th>이름\일차</th></tr></thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board-container content-box">
        <div class="board-title">🙏 오늘의 은혜 & 기도</div>
        <div id="board-list" class="board-list"></div>
        <div class="board-input-group">
            <input type="text" id="post-name" placeholder="이름 (또는 익명)">
            <textarea id="post-content" rows="3" placeholder="말씀의 은혜, 기도제목을 나눠주세요..."></textarea>
            <button class="btn-post" id="post-btn" onclick="postMessage()">등록하기</button>
        </div>
    </div>
    
    <div class="footer">
        <button id="admin-btn" class="nav-btn btn-admin" onclick="handleAdmin()">관리자 모드</button>
        <button class="nav-btn btn-refresh" onclick="location.reload()">새로고침</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymFm-qPAVpZSVMxgZix7im1gM4RcrPP3WO4nWSIce9PL-lOlwIS2g7iSTjKQwv6hCo/exec";
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';

        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };

        async function init() {
            updateAdminUI();
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                render(data.attendance);
                calculateStats(data.attendance);
                renderBoard(data.messages);
                
                // 로딩 부드럽게 제거
                const loading = document.getElementById('loading');
                loading.style.opacity = '0';
                setTimeout(() => { loading.style.display = 'none'; }, 300);
            } catch (e) { 
                console.error(e); 
                document.getElementById('loading').textContent = "연결이 원활하지 않습니다. 새로고침 해주세요.";
            }
        }

        function updateAdminUI() {
            const btn = document.getElementById('admin-btn');
            if (isAdmin) {
                btn.textContent = "관리자 해제";
                btn.className = "nav-btn btn-logout";
            } else {
                btn.textContent = "관리자 모드";
                btn.className = "nav-btn btn-admin";
            }
        }

        function render(sheetData) {
            const hRow = document.getElementById('header-row');
            const tbody = document.getElementById('attendance-body');
            hRow.innerHTML = "<th>이름\\일차</th>";
            tbody.innerHTML = "";
            for(let i=1; i<=90; i++) { 
                let th = document.createElement('th'); th.textContent = i+'일'; hRow.appendChild(th); 
            }
            let pRow = document.createElement('tr'); pRow.className = 'plan-row';
            pRow.innerHTML = "<td>읽을 말씀</td>";
            for(let i=1; i<=90; i++) { 
                let td = document.createElement('td'); td.textContent = biblePlan[i] || ""; pRow.appendChild(td); 
            }
            tbody.appendChild(pRow);
            for(let r=1; r<sheetData.length; r++) {
                let name = sheetData[r][0]; if(!name) continue;
                let tr = document.createElement('tr');
                let tdName = document.createElement('td'); tdName.textContent = name; tr.appendChild(tdName);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td');
                    let cb = document.createElement('input'); cb.type = 'checkbox';
                    cb.checked = (sheetData[r][i] === "V");
                    if(cb.checked) td.className = 'checked-cell';
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("관리자 모드가 필요합니다."); return; }
                        // 낙관적 업데이트: 화면 먼저 변경
                        td.className = cb.checked ? 'checked-cell' : '';
                        fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'attendance', name:name, day:i, checked:cb.checked}) });
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function calculateStats(sheetData) {
            const userCount = sheetData.length - 1;
            let checkCount = 0;
            for(let r=1; r<sheetData.length; r++) {
                for(let c=1; c<=90; c++) { if(sheetData[r][c] === "V") checkCount++; }
            }
            const totalCells = userCount * 90;
            const percent = totalCells > 0 ? Math.round((checkCount / totalCells) * 100) : 0;
            document.getElementById('total-users').textContent = userCount;
            document.getElementById('total-checks').textContent = checkCount;
            document.getElementById('overall-percent').textContent = percent + "%";
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        function renderBoard(messages) {
            const list = document.getElementById('board-list');
            if(!messages || messages.length === 0) { list.innerHTML = "<div class='board-item'>은혜를 나눠주세요!</div>"; return; }
            list.innerHTML = "";
            messages.reverse().forEach(m => {
                const item = document.createElement('div');
                item.className = 'board-item';
                let delBtn = isAdmin ? `<button class="btn-delete" onclick="deleteMessage('${m.id}', this)">삭제</button>` : '';
                let likeCount = m.likes || 0;

                item.innerHTML = `
                    ${delBtn}
                    <span style="font-weight:bold; color:var(--main-blue);">${m.name}:</span> 
                    <span>${m.content}</span>
                    <button class="btn-like" onclick="likeMessage('${m.id}', this)">❤️ <span>${likeCount}</span></button>
                `;
                list.appendChild(item);
            });
        }

        // [속도 최적화] 낙관적 업데이트: 서버 응답 전 화면 먼저 변경
        async function likeMessage(msgId, btn) {
            const countSpan = btn.querySelector('span');
            countSpan.textContent = parseInt(countSpan.textContent) + 1;
            btn.style.color = "#ff4757";
            
            // 서버에 조용히 전송
            fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'like_message', id:msgId}) });
        }

        async function postMessage() {
            const nameInput = document.getElementById('post-name');
            const contentInput = document.getElementById('post-content');
            const name = nameInput.value || "익명";
            const content = contentInput.value;
            if(!content) return alert("내용을 입력해주세요.");
            
            const btn = document.getElementById('post-btn');
            btn.disabled = true;
            btn.textContent = "등록 중...";
            
            await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'message', name:name, content:content}) });
            
            contentInput.value = "";
            btn.disabled = false;
            btn.textContent = "등록하기";
            
            // 게시판만 조용히 갱신
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderBoard(data.messages);
        }

        async function deleteMessage(msgId, btn) {
            if(!confirm("이 글을 삭제하시겠습니까?")) return;
            btn.parentElement.style.opacity = '0.3';
            await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'delete_message', id:msgId}) });
            btn.parentElement.remove();
        }

        function handleAdmin() {
            if (!isAdmin) {
                let pw = prompt("관리자 암호");
                if(pw === "9191") { 
                    isAdmin = true; 
                    localStorage.setItem('bible_admin_mode', 'true');
                    updateAdminUI();
                    location.reload(); // 관리자 권한 반영을 위해 1회 새로고침
                } else { alert("비밀번호가 틀렸습니다."); }
            } else { 
                isAdmin = false; 
                localStorage.removeItem('bible_admin_mode');
                updateAdminUI();
                location.reload();
            }
        }
        init();
    </script>
</body>
</html>
