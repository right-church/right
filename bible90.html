<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90일 성경통독 출석부</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .table-container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            white-space: nowrap;
        }
        th {
            background-color: #3498db;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        input[type="text"] {
            width: 130px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .reset-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        .reset-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <h1>📖 90일 성경통독 출석부</h1>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>일차</th>
                    <th>읽을 분량</th>
                    <th>김사라</th>
                    <th>김성은</th>
                    <th>김정동</th>
                    <th>김하정</th>
                    <th>박금희</th>
                    <th>유진헌</th>
                    <th>이영숙</th>
                    <th>한진경</th>
                </tr>
            </thead>
            <tbody id="attendance-body">
                </tbody>
        </table>
    </div>

    <button class="reset-btn" onclick="resetData()">전체 초기화 (데이터 삭제)</button>

    <script>
        const tbody = document.getElementById('attendance-body');
        const members = ["김사라", "김성은", "김정동", "김하정", "박금희", "유진헌", "이영숙", "한진경"];
        const totalDays = 90;

        for (let i = 1; i <= totalDays; i++) {
            let tr = document.createElement('tr');
            
            // 1. 일차 표시
            let tdDay = document.createElement('td');
            tdDay.innerHTML = `<strong>${i}일차</strong>`;
            tr.appendChild(tdDay);

            // 2. 분량 입력칸
            let tdPortion = document.createElement('td');
            let inputPortion = document.createElement('input');
            inputPortion.type = 'text';
            inputPortion.placeholder = '분량 입력';
            inputPortion.value = localStorage.getItem(`bible-portion-${i}`) || '';
            inputPortion.addEventListener('input', function() {
                localStorage.setItem(`bible-portion-${i}`, this.value);
            });
            tdPortion.appendChild(inputPortion);
            tr.appendChild(tdPortion);

            // 3. 8명 이름별 체크박스
            members.forEach((name, index) => {
                let tdCheck = document.createElement('td');
                let checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                // 저장 키값에 이름을 포함하여 데이터 혼선을 방지합니다.
                const storageKey = `bible-check-${i}-${name}`;
                checkbox.checked = localStorage.getItem(storageKey) === 'true';
                
                checkbox.addEventListener('change', function() {
                    localStorage.setItem(storageKey, this.checked);
                });
                
                tdCheck.appendChild(checkbox);
                tr.appendChild(tdCheck);
            });

            tbody.appendChild(tr);
        }

        function resetData() {
            if (confirm("모든 참석 데이터와 분량 기록을 삭제할까요?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>

</body>
</html>
