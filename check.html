<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { 
            /* macOS Graphite & Blue */
            --primary: #007aff; 
            --secondary: #8e8e93;
            --success: #28cd41; /* Mac Green */
            --danger: #ff5f57; /* Mac Red */
            --warning: #febc2e; /* Mac Yellow */
            --bg-color: #f6f6f6; /* macOS Light Gray */
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: #dcdcdc; /* macOS Border */
            --text-dark: #1d1d1f;
            --today-bg: #e1e9ff;
            --today-text: #007aff;
            --mac-window-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 0;
            color: var(--text-dark);
            -webkit-text-size-adjust: none;
            line-height: 1.4;
        }

        /* Apple 스타일 로딩 화면 (Glassmorphism 적용) */
        #loader { 
            position: fixed; inset: 0; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; 
        }

        .apple-spinner { position: relative; width: 32px; height: 32px; }
        .apple-spinner div {
            position: absolute; width: 3px; height: 8px;
            background: #a5a5a5; border-radius: 5px;
            left: 14.5px; top: 0;
            transform-origin: 1.5px 16px;
            animation: apple-fade 1s linear infinite;
        }
        /* 회전 막대 배치 및 애니메이션 지연 */
        .apple-spinner div:nth-child(1) { transform: rotate(0deg); animation-delay: -1s; }
        .apple-spinner div:nth-child(2) { transform: rotate(45deg); animation-delay: -0.875s; }
        .apple-spinner div:nth-child(3) { transform: rotate(90deg); animation-delay: -0.75s; }
        .apple-spinner div:nth-child(4) { transform: rotate(135deg); animation-delay: -0.625s; }
        .apple-spinner div:nth-child(5) { transform: rotate(180deg); animation-delay: -0.5s; }
        .apple-spinner div:nth-child(6) { transform: rotate(225deg); animation-delay: -0.375s; }
        .apple-spinner div:nth-child(7) { transform: rotate(270deg); animation-delay: -0.25s; }
        .apple-spinner div:nth-child(8) { transform: rotate(315deg); animation-delay: -0.125s; }

        @keyframes apple-fade {
            from { opacity: 1; background: #555; }
            to { opacity: 0.2; background: #a5a5a5; }
        }

        /* Mac 창 스타일 대시보드 */
        .mac-window {
            width: 96%; max-width: 1200px; margin: 20px auto; 
            background: var(--card-bg); border-radius: 12px; 
            box-shadow: var(--mac-window-shadow);
            border: 1px solid var(--border); overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* macOS 창 타이틀바 (신호등 버튼 추가) */
        .title-bar {
            height: 38px; background: #e8e8e8;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 15px;
            position: sticky; top: 0; z-index: 50;
        }
        .mac-buttons { display: flex; gap: 8px; margin-right: 15px; }
        .mac-buttons div { width: 12px; height: 12px; border-radius: 50%; }
        .btn-red { background: var(--danger); }
        .btn-yellow { background: var(--warning); }
        .btn-green { background: var(--success); }
        
        .header-title { font-size: 0.85rem; font-weight: 700; color: #555; flex: 1; text-align: center; margin-right: 50px; }

        /* 메인 콘텐츠 영역 */
        .main-content { padding: 15px; }

        /* stats 섹션 (Mac 스타일) */
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; padding: 10px 0; background: rgba(0,0,0,0.02); border-radius: 8px; }
        .stat-box { text-align: center; }
        .stat-box .val { font-size: 1.1rem; font-weight: 700; color: var(--primary); display: block; }
        .stat-box .lbl { font-size: 0.65rem; color: var(--secondary); font-weight: 500; }
        
        .progress-container { background: #e0e0e0; border-radius: 10px; height: 8px; overflow: hidden; margin: 0 10px; }
        .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.8s ease; }

        /* 테이블 규격: 45x38 (요청 사항 준수) */
        .table-section { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: #fff; }
        .scroll-area { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; }
        
        th, td { 
            height: 38px !important; width: 45px !important;
            border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); 
            text-align: center; vertical-align: middle; padding: 0; box-sizing: border-box;
        }
        
        /* 고정 이름 열 */
        th:first-child, td:first-child { 
            width: 55px !important; position: sticky; left: 0; z-index: 10; 
            background: #fff; border-right: 1.5px solid var(--border);
            font-size: 0.8rem; font-weight: 600; color: var(--text-dark);
        }
        
        th { background: #f0f0f0; color: #666; font-size: 0.65rem; font-weight: 500; }
        .plan-row td { background-color: #fffaf0; color: #a0522d; font-size: 0.6rem; font-weight: 600; }

        /* 체크박스: macOS 스타일 */
        input[type="checkbox"] { 
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px; border: 1.5px solid #c0c0c0; border-radius: 4px;
            background: #fff; cursor: pointer; position: relative; transition: 0.1s;
        }
        input[type="checkbox"]:checked { background: var(--primary); border-color: var(--primary); }
        input[type="checkbox"]:checked::after {
            content: '✓'; color: white; position: absolute;
            left: 50%; top: 46%; transform: translate(-50%, -50%);
            font-size: 11px; font-weight: bold;
        }

        .today-mark { background-color: var(--today-bg) !important; color: var(--today-text) !important; }
        .date-label { font-size: 0.5rem; opacity: 0.5; display: block; margin-top: -2px;}

        /* 게시판 스타일 (Mac 특유의 Graphite 감성) */
        .board-section { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .msg-box { background: rgba(0,0,0,0.02); border-radius: 8px; padding: 8px; margin-bottom: 5px; font-size: 0.85rem; }
        .msg-name { font-weight: 700; color: var(--text-dark); margin-right: 4px; }
        
        .input-group { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 2px; display: flex; gap: 4px; margin-top: 10px; }
        .input-group input { border: none; background: transparent; padding: 6px; font-size: 0.8rem; outline: none; flex: 1; }
        .btn-send { background: #ddd; color: #555; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 0.75rem; }

        /* 하단 내비바 (Mac 특유의 블러 효과 적용) */
        .mac-toolbar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 44px;
            background: rgba(232, 232, 232, 0.8);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center; gap: 15px;
            z-index: 50;
        }
        .btn-ui { padding: 6px 12px; border-radius: 6px; border: none; font-weight: 500; font-size: 0.7rem; color: #555; background: transparent; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="apple-spinner">
            <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
        <p style="font-size:0.85rem; color:var(--secondary); margin-top:16px; font-weight:500;">데이터 로딩 중</p>
    </div>

    <div class="mac-window">
        <div class="title-bar">
            <div class="mac-buttons">
                <div class="btn-red"></div>
                <div class="btn-yellow"></div>
                <div class="btn-green"></div>
            </div>
            <div class="header-title">📖 성경통독 대시보드</div>
            <div id="tongdok-period" class="period-badge">...</div>
        </div>

        <div class="main-content">
            <div class="stats">
                <div class="stat-box"><span id="total-users" class="val">0</span><span class="lbl">성도수</span></div>
                <div class="stat-box"><span id="total-checks" class="val">0</span><span class="lbl">누적읽기</span></div>
                <div class="stat-box"><span id="overall-percent" class="val">0%</span><span class="lbl">진도율</span></div>
            </div>
            <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>

            <p style="height:10px"></p> <div class="table-section">
                <div id="scroll-container" class="scroll-area">
                    <table>
                        <thead><tr id="h-row"><th>이름</th></tr></thead>
                        <tbody id="a-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="board-section card">
                <div style="font-size:0.9rem; font-weight:700; margin-bottom:10px;">💬 은혜 나눔</div>
                <div id="msg-list"></div>
                <div class="input-group">
                    <input type="text" id="in-name" placeholder="이름" style="width:40px;">
                    <input type="text" id="in-content" placeholder="메모 남기기">
                    <button class="btn-send" onclick="postMessage()">전송</button>
                </div>
            </div>
        </div>
    </div>
    <div class="mac-toolbar">
        <button id="admin-btn" class="btn-ui" onclick="handleAdmin()">관리자 인증</button>
        <button class="btn-ui" onclick="location.reload()">새로고침</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let tIndex = -1;

        async function init() {
            if(isAdmin) document.getElementById('admin-btn').textContent = "관리자 로그아웃";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.startDate) { calcToday(data.startDate); showPeriod(data.startDate); }
                renderTable(data.attendance, data.startDate);
                updateStats(data.attendance);
                renderBoard(data.messages);
                if (tIndex > 0) setTimeout(scrollToToday, 600);
                document.getElementById('loader').style.display = 'none';
            } catch (e) { document.getElementById('loader').innerHTML = "네트워크 오류"; }
        }

        function showPeriod(s) {
            const start = parseD(s); if(!start) return;
            let curr = new Date(start), count = 0, end = new Date(start);
            while(count < 90) { if(curr.getDay()!==0) { count++; if(count===90) end=new Date(curr); } curr.setDate(curr.getDate()+1); }
            const f = (d) => `${d.getMonth()+1}/${d.getDate()}`;
            document.getElementById('tongdok-period').textContent = `${f(start)} - ${f(end)} 기간 통독`;
        }

        function calcToday(s) {
            const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const start = parseD(s); if(!start || today < start) return;
            let curr = new Date(start), count = 0;
            while(curr <= today && count < 150) { if(curr.getDay()!==0) { count++; if(curr.getTime()===today.getTime()) { tIndex=count; break; } } curr.setDate(curr.getDate()+1); }
        }

        function parseD(s) { const p = s.split('-'); return p.length===3?new Date(p[0],p[1]-1,p[2]):null; }

        function renderTable(sd, ss) {
            const hr = document.getElementById('h-row'); const tb = document.getElementById('a-body'); const start = parseD(ss);
            hr.innerHTML = "<th>이름</th>"; tb.innerHTML = "";
            let cursor = start ? new Date(start) : null;
            for(let i=1; i<=90; i++) {
                let dStr = ""; if(cursor) { while(cursor.getDay()===0) cursor.setDate(cursor.getDate()+1); dStr = `${cursor.getMonth()+1}/${cursor.getDate()}`; }
                let th = document.createElement('th'); th.id = `day-${i}`;
                th.innerHTML = `<span class="date-label">${dStr}</span>${i}일`;
                if(i===tIndex) th.className = 'today-mark';
                hr.appendChild(th); if(cursor) cursor.setDate(cursor.getDate()+1);
            }
            let pr = document.createElement('tr'); pr.className='plan-row'; pr.innerHTML="<td>본문</td>";
            for(let i=1; i<=90; i++) { let td=document.createElement('td'); td.innerHTML=biblePlan[i]||""; if(i===tIndex) td.className='today-mark'; pr.appendChild(td); }
            tb.appendChild(pr);
            for(let r=1; r<sd.length; r++) {
                let n = sd[r][0]; if(!n) continue;
                let tr = document.createElement('tr'); let tn = document.createElement('td'); tn.textContent = n; tr.appendChild(tn);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td'); if(i===tIndex) td.className='today-mark';
                    let cb = document.createElement('input'); cb.type='checkbox'; cb.checked=(sd[r][i]==="V");
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("관리자만 수정 가능합니다."); return; }
                        updateStats(sd); fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'attendance', name:n, day:i, checked:cb.checked})});
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                tb.appendChild(tr);
            }
        }

        function updateStats(sd) {
            const users = sd.length - 1; let checks = 0;
            document.querySelectorAll('#a-body tr:not(.plan-row) input[type="checkbox"]').forEach(c => {if(c.checked) checks++;});
            const pct = Math.round((checks / (users * 90)) * 100) || 0;
            document.getElementById('total-users').textContent = users;
            document.getElementById('total-checks').textContent = checks;
            document.getElementById('overall-percent').textContent = pct + "%";
            setTimeout(() => { document.getElementById('progress-bar').style.width = pct + "%"; }, 100);
        }

        function renderBoard(ms) {
            const l = document.getElementById('msg-list'); l.innerHTML = "";
            [...ms].reverse().slice(0, 5).forEach(m => {
                const i = document.createElement('div'); i.className = 'msg-box';
                i.innerHTML = `<span class="msg-name">${m.name}:</span> ${m.content}`;
                l.appendChild(i);
            });
        }

        async function postMessage() {
            const n = document.getElementById('in-name').value; const c = document.getElementById('in-content').value;
            if(!n || !c) return; document.getElementById('loader').style.display='flex';
            await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'message', name:n, content:c})});
            location.reload();
        }

        function scrollToToday() {
            const s = document.getElementById('scroll-container'); const t = document.getElementById(`day-${tIndex}`);
            if(t) s.scrollTo({ left: t.offsetLeft - (window.innerWidth/2) + 22, behavior: 'smooth' });
        }

        function handleAdmin() {
            if(!isAdmin) { if(prompt("암호 입력")==="9191") { localStorage.setItem('bible_admin_mode','true'); location.reload(); } }
            else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
