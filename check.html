<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { 
            --main-blue: #5c7cfa; --dark-blue: #364fc7; --soft-blue: #edf2ff;
            --accent-green: #20c997; --light-bg: #f8f9fa; --card-bg: #ffffff;
            --border-color: #e9ecef; --admin-color: #51cf66; 
            --highlight-yellow: #fff9db; --highlight-text: #f08c00; 
            --text-main: #495057; --text-sub: #868e96; 
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--light-bg); margin: 0; padding: 5px 0; color: var(--text-main); -webkit-text-size-adjust: none; }

        .header-container { text-align: center; margin-bottom: 10px; }
        h1 { font-size: 1.1rem; margin: 0; color: var(--dark-blue); }
        #tongdok-period { font-size: 0.7rem; color: var(--text-sub); background: #e9ecef; padding: 1px 8px; border-radius: 10px; }

        .content-box { width: 96%; margin: 0 auto 8px auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 10px; box-sizing: border-box; }

        /* 통계 간소화 */
        .stats-grid { display: flex; margin-bottom: 8px; }
        .stat-item { text-align: center; flex: 1; border-right: 1px solid var(--border-color); }
        .stat-item:last-child { border-right: none; }
        .stat-value { font-size: 1rem; font-weight: 800; color: var(--main-blue); display: block; }
        .stat-label { font-size: 0.6rem; color: var(--text-sub); }
        .progress-wrapper { background: #e9ecef; border-radius: 5px; height: 6px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--main-blue), var(--accent-green)); height: 100%; width: 0%; transition: width 1s; }

        /* 테이블 높이 강제 축소 */
        .table-outer { padding: 0; overflow: hidden; border: 1px solid var(--border-color); border-radius: 8px; }
        .table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; table-layout: fixed; }
        
        /* 모든 셀 높이를 34px로 고정 */
        th, td { 
            padding: 0; margin: 0;
            border-bottom: 1px solid var(--border-color); 
            border-right: 1px solid var(--border-color); 
            text-align: center; vertical-align: middle; 
            height: 34px !important; 
            box-sizing: border-box;
        }
        
        /* 고정 이름열 너비 50px */
        th:first-child, td:first-child { 
            width: 50px !important; 
            position: sticky; left: 0; z-index: 20; 
            background-color: #ffffff; border-right: 2px solid var(--border-color);
            font-size: 0.75rem; font-weight: 700; 
        }
        /* 일차열 너비 45px */
        th:not(:first-child), td:not(:first-child) { width: 45px !important; }
        
        th { background-color: #f1f3f5; font-size: 0.65rem; line-height: 1.1; }
        
        /* 성경 본문 행 높이 30px */
        .plan-row td { 
            background-color: var(--highlight-yellow); 
            color: var(--highlight-text); 
            font-size: 0.55rem; font-weight: 700; 
            height: 30px !important;
        }
        
        /* 체크박스 크기 축소 (18px) */
        input[type="checkbox"] { 
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px; 
            border: 1px solid #ced4da; border-radius: 4px;
            background-color: #fff; cursor: pointer; display: inline-block;
            vertical-align: middle; margin: 0; padding: 0;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-green); border-color: var(--accent-green); }
        input[type="checkbox"]:checked::after {
            content: '✓'; color: white; position: absolute;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-size: 11px; font-weight: bold;
        }
        
        .today-cell { background-color: var(--soft-blue) !important; }
        .date-sub { font-size: 0.5rem; color: var(--text-sub); display: block; margin-bottom: -1px; }

        /* 게시판 및 하단 */
        .board-item { background: #f1f3f5; border-radius: 8px; padding: 6px 10px; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; }
        .btn-post { background: var(--main-blue); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; }
        .footer { margin: 10px 0 40px; display: flex; justify-content: center; gap: 8px; }
        .nav-btn { padding: 8px 16px; border-radius: 10px; font-size: 0.75rem; color: white; border: none; font-weight: 700; }
    </style>
</head>
<body>
    <div id="loading"><div style="font-size:0.8rem;">로딩 중...</div></div>
    
    <div class="header-container">
        <h1>📖 90일 성경통독</h1>
        <div id="tongdok-period">기간 로딩 중...</div>
    </div>

    <div class="stats-container content-box">
        <div class="stats-grid">
            <div class="stat-item"><span id="total-users" class="stat-value">0</span><span class="stat-label">동역자</span></div>
            <div class="stat-item"><span id="total-checks" class="stat-value">0</span><span class="stat-label">누적읽기</span></div>
            <div class="stat-item"><span id="overall-percent" class="stat-value">0%</span><span class="stat-label">진도율</span></div>
        </div>
        <div class="progress-wrapper"><div id="progress-bar" class="progress-fill"></div></div>
    </div>

    <div class="table-outer content-box">
        <div id="table-scroll-container" class="table-inner">
            <table>
                <thead><tr id="header-row"><th>이름\일차</th></tr></thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board-container content-box">
        <div id="board-list"></div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="post-name" placeholder="이름" maxlength="4" style="width:50px; border:1px solid var(--border-color); border-radius:8px; padding:8px; font-size:0.8rem;">
            <input type="text" id="post-content" placeholder="은혜를 나눠요." style="flex-grow:1; border:1px solid var(--border-color); border-radius:8px; padding:8px; font-size:0.8rem;">
        </div>
        <button class="btn-post" style="margin-top:5px;" onclick="postMessage()">나누기</button>
    </div>

    <div class="footer">
        <button id="admin-btn" class="nav-btn" style="background:var(--admin-color);" onclick="handleAdmin()">관리자</button>
        <button class="nav-btn" style="background:var(--text-sub);" onclick="location.reload()">새로고침</button>
    </div>

    <script>
        // ... (이전 코드의 script 부분과 동일하게 유지) ...
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let todayDayIndex = -1;

        async function init() {
            if(isAdmin) document.getElementById('admin-btn').textContent = "로그아웃";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.startDate) { calculateTodayIndex(data.startDate); displayPeriod(data.startDate); }
                renderTable(data.attendance, data.startDate);
                updateStats(data.attendance);
                renderBoard(data.messages);
                if (todayDayIndex > 0) setTimeout(scrollToToday, 600);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').innerHTML = "연결 실패"; }
        }

        function displayPeriod(startStr) {
            const dateObj = parseDate(startStr);
            if(!dateObj) return;
            let current = new Date(dateObj), dayCount = 0, endDate = new Date(dateObj);
            while (dayCount < 90) {
                if (current.getDay() !== 0) { dayCount++; if (dayCount === 90) endDate = new Date(current); }
                current.setDate(current.getDate() + 1);
            }
            const format = (d) => `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
            document.getElementById('tongdok-period').textContent = `${format(dateObj)} ~ ${format(endDate)}`;
        }

        function calculateTodayIndex(startStr) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const startDate = parseDate(startStr);
            if (!startDate || today < startDate) return;
            let current = new Date(startDate), dayCount = 0;
            while (current <= today && dayCount < 150) {
                if (current.getDay() !== 0) {
                    dayCount++;
                    if (current.getTime() === today.getTime()) { todayDayIndex = dayCount; break; }
                }
                current.setDate(current.getDate() + 1);
            }
        }

        function parseDate(str) {
            const p = str.split('-');
            return p.length === 3 ? new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])) : null;
        }

        function renderTable(sheetData, startDateStr) {
            const hRow = document.getElementById('header-row');
            const tbody = document.getElementById('attendance-body');
            const startDate = parseDate(startDateStr);
            hRow.innerHTML = "<th>이름</th>";
            tbody.innerHTML = "";

            let dateCursor = startDate ? new Date(startDate) : null;
            for(let i=1; i<=90; i++) {
                let dStr = "";
                if(dateCursor) {
                    while(dateCursor.getDay() === 0) dateCursor.setDate(dateCursor.getDate() + 1);
                    dStr = `${dateCursor.getMonth()+1}/${dateCursor.getDate()}`;
                }
                let th = document.createElement('th');
                th.id = `col-head-${i}`;
                th.innerHTML = `<span class="date-sub">${dStr}</span>${i}일`;
                if(i === todayDayIndex) th.className = 'today-cell';
                hRow.appendChild(th);
                if(dateCursor) dateCursor.setDate(dateCursor.getDate() + 1);
            }

            let pRow = document.createElement('tr');
            pRow.className = 'plan-row';
            pRow.innerHTML = "<td>본문</td>";
            for(let i=1; i<=90; i++) {
                let td = document.createElement('td');
                td.innerHTML = biblePlan[i] || "";
                if(i === todayDayIndex) td.className = 'today-cell';
                pRow.appendChild(td);
            }
            tbody.appendChild(pRow);

            for(let r=1; r<sheetData.length; r++) {
                let name = sheetData[r][0]; if(!name) continue;
                let tr = document.createElement('tr');
                let tdName = document.createElement('td'); tdName.textContent = name; tr.appendChild(tdName);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td');
                    if(i === todayDayIndex) td.className = 'today-cell';
                    let cb = document.createElement('input'); 
                    cb.type = 'checkbox'; cb.checked = (sheetData[r][i] === "V");
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("관리자 전용"); return; }
                        updateStats(sheetData); 
                        fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'attendance', name:name, day:i, checked:cb.checked}) });
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function updateStats(sheetData) {
            const userCount = sheetData.length - 1;
            let checkCount = 0;
            document.querySelectorAll('#attendance-body tr:not(.plan-row) input[type="checkbox"]').forEach(cb => { if(cb.checked) checkCount++; });
            const total = (userCount > 0) ? userCount * 90 : 1;
            const percent = Math.round((checkCount / total) * 100);
            document.getElementById('total-users').textContent = userCount;
            document.getElementById('total-checks').textContent = checkCount;
            document.getElementById('overall-percent').textContent = percent + "%";
            setTimeout(() => { document.getElementById('progress-bar').style.width = percent + "%"; }, 100);
        }

        function renderBoard(messages) {
            const list = document.getElementById('board-list');
            list.innerHTML = "";
            [...messages].reverse().slice(0, 5).forEach(m => {
                const item = document.createElement('div');
                item.className = 'board-item';
                item.innerHTML = `
                    <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                        <span style="font-weight:800; color:var(--main-blue);">${m.name}</span>: ${m.content}
                    </div>
                    <button class="btn-like" style="border:none; background:none; font-size:0.7rem;" onclick="likeMsg('${m.id}', this)">❤️ ${m.likes}</button>
                `;
                list.appendChild(item);
            });
        }

        async function postMessage() {
            const name = document.getElementById('post-name').value;
            const content = document.getElementById('post-content').value;
            if(!name || !content) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'message', name, content}) });
            location.reload();
        }

        async function likeMsg(id, btn) {
            btn.disabled = true;
            fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'like_message', id}) });
            let count = btn.innerText.split(' ')[1];
            btn.innerText = `❤️ ${parseInt(count)+1}`;
        }

        function scrollToToday() {
            const container = document.getElementById('table-scroll-container');
            const target = document.getElementById(`col-head-${todayDayIndex}`);
            if (target) {
                const scrollPos = target.offsetLeft - (window.innerWidth / 2) + (target.offsetWidth / 2);
                container.scrollTo({ left: scrollPos, behavior: 'smooth' });
            }
        }

        function handleAdmin() {
            if (!isAdmin) {
                if(prompt("비번") === "9191") { localStorage.setItem('bible_admin_mode', 'true'); location.reload(); }
            } else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
