<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 출석부</title>
    <style>
        :root { 
            --deep-green: #2D4030; /* 차분한 딥 그린 */
            --gold-point: #B59F67; /* 세련된 골드 포인트 */
            --soft-beige: #F9F8F5; /* 부드러운 배경색 */
            --text-main: #2C3E50;
            --border-color: #E2E8F0;
            --today-highlight: #F0F4F1;
        }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--soft-beige); margin: 0; padding: 20px 0; color: var(--text-main); -webkit-text-size-adjust: none; }
        
        /* 헤더 디자인 */
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.4rem; font-weight: 800; margin: 0; color: var(--deep-green); letter-spacing: -1px; }
        .header p { font-size: 0.8rem; color: var(--gold-point); margin-top: 5px; font-weight: 500; }
        
        .content-box { width: 92%; margin: 0 auto 15px auto; box-sizing: border-box; }
        
        /* 통계 섹션 */
        .stats-container { background: #ffffff; padding: 22px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
        .stats-grid { display: flex; margin-bottom: 15px; }
        .stat-item { text-align: center; flex: 1; position: relative; }
        .stat-item:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 25%; height: 50%; width: 1px; background: var(--border-color); }
        .stat-value { font-size: 1.2rem; font-weight: 800; color: var(--deep-green); display: block; }
        .stat-label { font-size: 0.7rem; color: #94A3B8; font-weight: 600; margin-top: 4px; }
        .progress-wrapper { background: #F1F5F9; border-radius: 10px; height: 6px; width: 100%; overflow: hidden; }
        .progress-fill { background: var(--gold-point); height: 100%; width: 0%; transition: width 1.2s ease-in-out; }

        /* 테이블 디자인 - 칸 너비 최적화(45px) */
        .table-outer { background: #ffffff; border-radius: 15px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th, td { border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); text-align: center; vertical-align: middle; }
        
        /* 이름 고정 열 */
        th:first-child, td:first-child { width: 60px; position: sticky; left: 0; z-index: 25; background: #fff; font-size: 0.8rem; font-weight: 700; border-right: 2px solid var(--deep-green); }
        th:not(:first-child), td:not(:first-child) { width: 45px; }
        
        th { background: #F8FAFC; color: var(--deep-green); height: 60px; padding: 0; }
        .day-num { font-size: 0.85rem; display: block; font-weight: 800; }
        .day-date { font-size: 0.6rem; font-weight: 400; color: #94A3B8; }
        
        .plan-row td { background: #ffffff; color: var(--gold-point); font-size: 0.65rem; font-weight: 700; height: 45px; }
        
        /* 투데이 표시 */
        .today-cell { background: var(--today-highlight) !important; position: relative; }
        th.today-cell::before { content: 'TODAY'; position: absolute; top: 0; left: 0; right: 0; background: var(--deep-green); color: white; font-size: 8px; font-weight: 800; padding: 1px 0; }

        /* 체크박스 */
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; border-radius: 4px; border: 2px solid var(--border-color); appearance: none; -webkit-appearance: none; display: inline-block; position: relative; transition: 0.2s; }
        input[type="checkbox"]:checked { background: var(--deep-green); border-color: var(--deep-green); }
        input[type="checkbox"]:checked::after { content: '✓'; color: white; position: absolute; left: 3px; top: -2px; font-size: 13px; font-weight: bold; }

        /* 게시판 */
        .board-container { background: #ffffff; border-radius: 15px; padding: 20px; border: 1px solid var(--border-color); }
        .board-title { font-size: 1rem; font-weight: 800; color: var(--deep-green); margin-bottom: 15px; }
        .board-item { padding: 10px 0; border-bottom: 1px solid #F1F5F9; font-size: 0.85rem; }
        .msg-name { font-weight: 800; color: var(--gold-point); margin-right: 8px; }
        .msg-content { color: #475569; }

        .input-group { display: flex; gap: 8px; margin-top: 15px; background: #F8FAFC; padding: 10px; border-radius: 10px; }
        input { border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; font-size: 0.8rem; }
        .btn-post { background: var(--deep-green); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; white-space: nowrap; }

        #loading { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f0f0f0; border-top: 3px solid var(--deep-green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div style="margin-top:10px; color: var(--deep-green); font-size: 0.8rem;">말씀을 불러오고 있습니다...</div></div>
    
    <div class="header">
        <h1>90일 성경통독 출석부</h1>
        <p id="period-text"></p>
    </div>

    <div class="stats-container content-box">
        <div class="stats-grid">
            <div class="stat-item"><span id="pct" class="stat-value">0%</span><span class="stat-label">진도율</span></div>
            <div class="stat-item"><span id="users" class="stat-value">0</span><span class="stat-label">참여자</span></div>
            <div class="stat-item"><span id="checks" class="stat-value">0</span><span class="stat-label">통독수</span></div>
        </div>
        <div class="progress-wrapper"><div id="bar" class="progress-fill"></div></div>
    </div>

    <div class="table-outer content-box">
        <div id="scroll-area" class="table-inner">
            <table>
                <thead><tr id="h-row"><th>이름</th></tr></thead>
                <tbody id="a-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board-container content-box">
        <div class="board-title">📖 은혜 한 구절</div>
        <div id="m-list"></div>
        <div class="input-group">
            <input type="text" id="n-in" placeholder="이름" style="width: 50px;">
            <input type="text" id="c-in" placeholder="오늘 받은 은혜를 기록하세요" style="flex: 1;">
            <button class="btn-post" onclick="postMessage()">등록</button>
        </div>
    </div>

    <div style="text-align:center; padding: 30px 0 50px;">
        <button onclick="location.reload()" style="background:#ddd; border:none; padding:8px 15px; border-radius:8px; font-size:0.7rem; color:#555;">새로고침</button>
        <button onclick="handleAdmin()" style="background:none; border:none; color:#ccc; font-size:0.7rem; margin-left:10px;">Admin</button>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let todayIdx = -1, startDt = null;

        async function init() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                if(data.startDate) {
                    const p = data.startDate.split('-');
                    startDt = new Date(p[0], p[1]-1, p[2]);
                    calcToday(data.startDate);
                }
                renderTable(data.attendance);
                updateStats();
                renderBoard(data.messages);
                if (todayIdx > 0) setTimeout(scrollToToday, 500);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').innerText = "접속 중..."; }
        }

        function calcToday(s) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let curr = new Date(s), count = 0;
            while (curr <= today && count < 180) { 
                if(curr.getDay() !== 0) { 
                    count++; 
                    if(curr.getTime() === today.getTime()) { todayIdx = count; break; } 
                } 
                curr.setDate(curr.getDate()+1); 
            }
            if(startDt) {
                let end = new Date(startDt), c = 0;
                while(c < 90) { if(end.getDay() !== 0) c++; if(c<90) end.setDate(end.getDate()+1); }
                const f = (d) => `${d.getMonth()+1}/${d.getDate()}`;
                document.getElementById('period-text').innerText = `${f(startDt)} ~ ${f(end)}`;
            }
        }

        function renderTable(data) {
            const h = document.getElementById('h-row'), b = document.getElementById('a-body');
            let dCur = startDt ? new Date(startDt) : null;
            
            for(let i=1; i<=90; i++) {
                let th = document.createElement('th');
                if(dCur) { while(dCur.getDay() === 0) dCur.setDate(dCur.getDate()+1); }
                let dStr = dCur ? `${dCur.getMonth()+1}/${dCur.getDate()}` : "";
                th.innerHTML = `<span class="day-num">${i}일</span><span class="day-date">${dStr}</span>`;
                if(i === todayIdx) th.className = 'today-cell';
                th.id = `col-${i}`;
                h.appendChild(th);
                if(dCur) dCur.setDate(dCur.getDate()+1);
            }

            let pRow = document.createElement('tr'); pRow.className='plan-row'; pRow.innerHTML="<td>본문</td>";
            for(let i=1; i<=90; i++) {
                let td = document.createElement('td'); td.textContent = biblePlan[i];
                if(i === todayIdx) td.className = 'today-cell';
                pRow.appendChild(td);
            }
            b.appendChild(pRow);

            for(let r=1; r<data.length; r++) {
                let name = data[r][0]; if(!name) continue;
                let tr = document.createElement('tr');
                let tn = document.createElement('td'); tn.textContent = name; tr.appendChild(tn);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td'); if(i===todayIdx) td.className='today-cell';
                    let cb = document.createElement('input'); cb.type='checkbox'; cb.checked=(data[r][i]==="V");
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("Admin 모드 전용입니다."); return; }
                        updateStats();
                        fetch(URL, {method:'POST', body:JSON.stringify({type:'attendance', name, day:i, checked:cb.checked})});
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                b.appendChild(tr);
            }
        }

        function updateStats() {
            const users = document.querySelectorAll('#a-body tr').length - 1;
            let checks = 0; document.querySelectorAll('input[type="checkbox"]').forEach(c => { if(c.checked) checks++; });
            const pct = Math.round((checks / (users * 90)) * 100) || 0;
            document.getElementById('users').textContent = users;
            document.getElementById('checks').textContent = checks;
            document.getElementById('pct').textContent = pct + "%";
            setTimeout(() => { document.getElementById('bar').style.width = pct + "%"; }, 100);
        }

        function renderBoard(msgs) {
            const l = document.getElementById('m-list'); l.innerHTML = "";
            [...msgs].reverse().slice(0, 5).forEach(m => {
                let d = document.createElement('div'); d.className='board-item';
                d.innerHTML = `<span class="msg-name">${m.name}</span><span class="msg-content">${m.content}</span>`;
                l.appendChild(d);
            });
        }

        async function postMessage() {
            const n = document.getElementById('n-in').value, c = document.getElementById('c-in').value;
            if(!n || !c) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(URL, {method:'POST', body:JSON.stringify({type:'message', name:n, content:c})});
            location.reload();
        }

        function scrollToToday() {
            const el = document.getElementById(`col-${todayIdx}`);
            if(el) document.getElementById('scroll-area').scrollTo({left: el.offsetLeft - 80, behavior:'smooth'});
        }

        function handleAdmin() {
            if(!isAdmin) { if(prompt("Pass?")==="9191") { localStorage.setItem('bible_admin_mode','true'); location.reload(); } }
            else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
