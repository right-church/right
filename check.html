<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { 
            --main-blue: #5c7cfa; 
            --dark-blue: #364fc7; 
            --soft-blue: #edf2ff;
            --accent-green: #20c997; 
            --light-bg: #f8f9fa; 
            --card-bg: #ffffff;
            --border-color: #dbe4ff; 
            --admin-color: #4dabf7; 
            --highlight-yellow: #fff9db; 
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--light-bg); 
            margin: 0; 
            padding: 15px 0;
            color: #495057;
            -webkit-text-size-adjust: none; 
            box-sizing: border-box; 
        }

        /* 헤더 섹션 */
        .header-container { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; font-weight: 800; margin: 0 0 6px 0; color: var(--dark-blue); }
        #tongdok-period { 
            display: inline-block; 
            font-size: 0.8rem; 
            color: var(--main-blue); 
            background: var(--soft-blue); 
            padding: 4px 14px; 
            border-radius: 20px; 
            font-weight: 600;
        }

        /* 카드 공통 스타일 */
        .content-box { 
            width: 94%; 
            margin: 0 auto 15px auto; 
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: 0 8px 24px rgba(92, 124, 250, 0.08); 
            padding: 15px;
            box-sizing: border-box; 
        }

        /* 통계 영역 */
        .stats-grid { display: flex; margin-bottom: 15px; }
        .stat-item { text-align: center; flex: 1; border-right: 1px solid var(--border-color); }
        .stat-item:last-child { border-right: none; }
        .stat-value { font-size: 1.3rem; font-weight: 800; color: var(--main-blue); display: block; }
        .stat-label { font-size: 0.75rem; color: #748ffc; margin-top: 2px; font-weight: 600; }
        .progress-wrapper { background: #e7f5ff; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--main-blue), var(--accent-green)); height: 100%; width: 0%; transition: width 1.2s ease; }

        /* 테이블 최적화 (칸 간격 45px 적용) */
        .table-outer { padding: 0; overflow: hidden; border: 1px solid var(--border-color); border-radius: 12px; }
        .table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; }
        th, td { padding: 0; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); text-align: center; vertical-align: middle; height: 55px; }
        
        /* 고정 이름열 */
        th:first-child, td:first-child { 
            width: 60px; 
            position: sticky; 
            left: 0; 
            z-index: 20; 
            background-color: var(--soft-blue); 
            border-right: 2px solid var(--main-blue); 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--dark-blue);
        }
        /* 일반 일차열: 너비 45px */
        th:not(:first-child), td:not(:first-child) { width: 45px; }
        
        th { background-color: #f1f3f5; color: #495057; font-size: 0.75rem; font-weight: 700; }
        .plan-row td { 
            background-color: var(--highlight-yellow); 
            color: #f08c00; 
            font-size: 0.65rem; 
            font-weight: 700; 
            line-height: 1.1;
        }
        
        /* 체크박스 디자인 */
        input[type="checkbox"] { 
            appearance: none; -webkit-appearance: none;
            width: 22px; height: 22px; 
            border: 2px solid var(--border-color); 
            border-radius: 6px;
            background-color: #fff;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        input[type="checkbox"]:checked { background-color: var(--main-blue); border-color: var(--main-blue); }
        input[type="checkbox"]:checked::after {
            content: '✓'; color: white; position: absolute;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-size: 14px; font-weight: bold;
        }
        
        /* 오늘 표시 및 전체 날짜 서브 텍스트 */
        .today-cell { background-color: #d6e4ff !important; }
        .date-sub { font-size: 0.55rem; font-weight: 500; color: #748ffc; margin-bottom: 2px; display: block; line-height: 1; }
        th.today-cell .date-sub { color: var(--dark-blue); font-weight: 800; }
        th.today-cell::before { 
            content: 'TODAY'; position: absolute; top: 1px; left: 50%; transform: translateX(-50%); 
            font-size: 0.45rem; background: var(--dark-blue); color: white; padding: 0px 3px; border-radius: 2px; font-weight: 800; 
        }

        /* 게시판 및 기타 */
        .board-title { font-size: 1.1rem; font-weight: 800; color: var(--dark-blue); margin-bottom: 15px; }
        .board-item { background: var(--soft-blue); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .msg-name { font-weight: 800; color: var(--main-blue); font-size: 0.8rem; }
        .msg-content { color: var(--dark-blue); font-size: 0.9rem; margin-top: 2px; }
        .btn-like { background: #fff; border: 1px solid var(--border-color); color: var(--main-blue); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
        .btn-post { background: var(--main-blue); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 1rem; width: 100%; cursor: pointer; }
        .footer { margin: 20px 0 60px; display: flex; justify-content: center; gap: 12px; }
        .nav-btn { padding: 12px 24px; border-radius: 15px; font-size: 0.85rem; color: white; border: none; font-weight: 700; cursor: pointer; }

        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; flex-direction: column; justify-content:center; align-items:center; z-index:1000; }
        .spinner { width: 30px; height: 30px; border: 4px solid var(--soft-blue); border-top: 4px solid var(--main-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div style="color:var(--dark-blue); font-weight:700;">말씀을 불러오고 있습니다...</div></div>
    
    <div class="header-container">
        <h1>📖 90일 성경통독</h1>
        <div id="tongdok-period">기간 로딩 중...</div>
    </div>

    <div class="stats-container content-box">
        <div class="stats-grid">
            <div class="stat-item"><span id="total-users" class="stat-value">0</span><span class="stat-label">동역자</span></div>
            <div class="stat-item"><span id="total-checks" class="stat-value">0</span><span class="stat-label">누적읽기</span></div>
            <div class="stat-item"><span id="overall-percent" class="stat-value">0%</span><span class="stat-label">진도율</span></div>
        </div>
        <div class="progress-wrapper"><div id="progress-bar" class="progress-fill"></div></div>
    </div>

    <div class="table-outer content-box">
        <div id="table-scroll-container" class="table-inner">
            <table>
                <thead><tr id="header-row"><th>이름\일차</th></tr></thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board-container content-box">
        <div class="board-title">💬 오늘 주신 은혜</div>
        <div id="board-list"></div>
        <div class="board-input-group">
            <div style="display:flex; gap:8px; margin-bottom:8px;">
                <input type="text" id="post-name" placeholder="이름" maxlength="4" style="width:70px; padding:12px; border:1px solid var(--border-color); border-radius:12px;">
                <input type="text" id="post-content" placeholder="구절이나 소감을 나누어주세요." style="flex-grow:1; padding:12px; border:1px solid var(--border-color); border-radius:12px;">
            </div>
            <button class="btn-post" onclick="postMessage()">은혜 나누기</button>
        </div>
    </div>

    <div class="footer">
        <button id="admin-btn" class="nav-btn" style="background:var(--admin-color);" onclick="handleAdmin()">관리자 인증</button>
        <button class="nav-btn" style="background:#adb5bd;" onclick="location.reload()">새로고침</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let todayDayIndex = -1;

        async function init() {
            if(isAdmin) document.getElementById('admin-btn').textContent = "로그아웃";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.startDate) {
                    calculateTodayIndex(data.startDate);
                    displayPeriod(data.startDate);
                }
                renderTable(data.attendance, data.startDate);
                updateStats(data.attendance);
                renderBoard(data.messages);
                if (todayDayIndex > 0) setTimeout(scrollToToday, 600);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').innerHTML = "데이터 연결 실패"; }
        }

        function displayPeriod(startStr) {
            const dateObj = parseDate(startStr);
            if(!dateObj) return;
            let current = new Date(dateObj), dayCount = 0, endDate = new Date(dateObj);
            while (dayCount < 90) {
                if (current.getDay() !== 0) { dayCount++; if (dayCount === 90) endDate = new Date(current); }
                current.setDate(current.getDate() + 1);
            }
            const format = (d) => `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
            document.getElementById('tongdok-period').textContent = `${format(dateObj)} ~ ${format(endDate)}`;
        }

        function calculateTodayIndex(startStr) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const startDate = parseDate(startStr);
            if (!startDate || today < startDate) return;
            let current = new Date(startDate), dayCount = 0;
            while (current <= today && dayCount < 150) {
                if (current.getDay() !== 0) {
                    dayCount++;
                    if (current.getTime() === today.getTime()) { todayDayIndex = dayCount; break; }
                }
                current.setDate(current.getDate() + 1);
            }
        }

        function parseDate(str) {
            const p = str.split('-');
            return p.length === 3 ? new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])) : null;
        }

        function renderTable(sheetData, startDateStr) {
            const hRow = document.getElementById('header-row');
            const tbody = document.getElementById('attendance-body');
            const startDate = parseDate(startDateStr);
            hRow.innerHTML = "<th>이름\\일차</th>";
            tbody.innerHTML = "";

            let dateCursor = startDate ? new Date(startDate) : null;
            for(let i=1; i<=90; i++) {
                let dStr = "";
                if(dateCursor) {
                    while(dateCursor.getDay() === 0) dateCursor.setDate(dateCursor.getDate() + 1);
                    dStr = `${dateCursor.getMonth()+1}/${dateCursor.getDate()}`;
                }
                let th = document.createElement('th');
                th.id = `col-head-${i}`;
                th.innerHTML = `<span class="date-sub">${dStr}</span>${i}일`;
                if(i === todayDayIndex) th.className = 'today-cell';
                hRow.appendChild(th);
                if(dateCursor) dateCursor.setDate(dateCursor.getDate() + 1);
            }

            let pRow = document.createElement('tr');
            pRow.className = 'plan-row';
            pRow.innerHTML = "<td>성경 본문</td>";
            for(let i=1; i<=90; i++) {
                let td = document.createElement('td');
                td.innerHTML = biblePlan[i] || "";
                if(i === todayDayIndex) td.className = 'today-cell';
                pRow.appendChild(td);
            }
            tbody.appendChild(pRow);

            for(let r=1; r<sheetData.length; r++) {
                let name = sheetData[r][0]; if(!name) continue;
                let tr = document.createElement('tr');
                let tdName = document.createElement('td'); tdName.textContent = name; tr.appendChild(tdName);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td');
                    if(i === todayDayIndex) td.className = 'today-cell';
                    let cb = document.createElement('input'); 
                    cb.type = 'checkbox'; cb.checked = (sheetData[r][i] === "V");
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("관리자 모드 전용입니다."); return; }
                        updateStats(sheetData); 
                        fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'attendance', name:name, day:i, checked:cb.checked}) });
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function updateStats(sheetData) {
            const userCount = sheetData.length - 1;
            let checkCount = 0;
            document.querySelectorAll('#attendance-body tr:not(.plan-row) input[type="checkbox"]').forEach(cb => { if(cb.checked) checkCount++; });
            const total = (userCount > 0) ? userCount * 90 : 1;
            const percent = Math.round((checkCount / total) * 100);
            document.getElementById('total-users').textContent = userCount;
            document.getElementById('total-checks').textContent = checkCount;
            document.getElementById('overall-percent').textContent = percent + "%";
            setTimeout(() => { document.getElementById('progress-bar').style.width = percent + "%"; }, 100);
        }

        function renderBoard(messages) {
            const list = document.getElementById('board-list');
            list.innerHTML = "";
            [...messages].reverse().slice(0, 15).forEach(m => {
                const item = document.createElement('div');
                item.className = 'board-item';
                item.innerHTML = `
                    <div style="flex-grow:1; overflow:hidden;">
                        <div class="msg-name">${m.name}</div>
                        <div class="msg-content" onclick="alert('${m.content}')">${m.content}</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <button class="btn-like" onclick="likeMsg('${m.id}', this)">❤️ ${m.likes}</button>
                        ${isAdmin ? `<button onclick="deleteMsg('${m.id}')" style="margin-left:8px; border:none; background:none; color:var(--main-blue); font-size:1.2rem; cursor:pointer;">✕</button>` : ''}
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function postMessage() {
            const name = document.getElementById('post-name').value;
            const content = document.getElementById('post-content').value;
            if(!name || !content) return alert("내용을 입력해주세요.");
            document.getElementById('loading').style.display = 'flex';
            await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'message', name, content}) });
            location.reload();
        }

        async function likeMsg(id, btn) {
            btn.disabled = true;
            fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'like_message', id}) });
            let count = btn.innerText.split(' ')[1];
            btn.innerText = `❤️ ${parseInt(count)+1}`;
        }

        async function deleteMsg(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({type:'delete_message', id}) });
            location.reload();
        }

        function scrollToToday() {
            const container = document.getElementById('table-scroll-container');
            const target = document.getElementById(`col-head-${todayDayIndex}`);
            if (target) {
                const scrollPos = target.offsetLeft - (window.innerWidth / 2) + (target.offsetWidth / 2);
                container.scrollTo({ left: scrollPos, behavior: 'smooth' });
            }
        }

        function handleAdmin() {
            if (!isAdmin) {
                if(prompt("관리자 암호") === "9191") { localStorage.setItem('bible_admin_mode', 'true'); location.reload(); }
            } else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
