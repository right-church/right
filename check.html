<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독</title>
    <style>
        :root { 
            --warm-bg: #FAF7F2; 
            --warm-card: #FFFFFF;
            --warm-point: #D4A373; /* 부드러운 브라운 */
            --warm-accent: #E76F51; /* 따뜻한 테라코타 오렌지 */
            --warm-text: #5F4B32;
            --warm-border: #E9E0D2;
            --today-bg: #FFF3E0;
        }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--warm-bg); margin: 0; padding: 20px 0; color: var(--warm-text); -webkit-text-size-adjust: none; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.5rem; font-weight: 800; margin: 0; color: var(--warm-text); letter-spacing: -1px; }
        .header p { font-size: 0.85rem; color: var(--warm-point); margin-top: 5px; }
        
        .content-box { width: 92%; margin: 0 auto 15px auto; }
        
        /* 통계 섹션 */
        .stats-container { background: var(--warm-card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 12px rgba(95,75,50,0.05); border: 1px solid var(--warm-border); }
        .stats-grid { display: flex; margin-bottom: 15px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 1.3rem; font-weight: 800; color: var(--warm-accent); display: block; }
        .stat-label { font-size: 0.75rem; color: var(--warm-point); margin-top: 4px; font-weight: 600; }
        .progress-wrapper { background: #F0EDE7; border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--warm-point), var(--warm-accent)); height: 100%; width: 0%; transition: width 1.5s ease-out; }

        /* 테이블 - 칸 너비 45px */
        .table-outer { background: var(--warm-card); border-radius: 20px; border: 1px solid var(--warm-border); overflow: hidden; }
        .table-inner { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; }
        th, td { border-bottom: 1px solid var(--warm-border); border-right: 1px solid var(--warm-border); text-align: center; vertical-align: middle; }
        
        /* 이름 고정 열 */
        th:first-child, td:first-child { width: 65px; position: sticky; left: 0; z-index: 25; background: var(--warm-card); font-size: 0.85rem; font-weight: 700; border-right: 2.5px solid var(--warm-point); }
        th:not(:first-child), td:not(:first-child) { width: 45px; }
        
        th { background: #FCFAF7; height: 65px; padding: 0; }
        .day-num { font-size: 0.9rem; display: block; font-weight: 800; }
        .day-date { font-size: 0.65rem; color: var(--warm-point); }
        
        .plan-row td { background: #FFFDFB; color: var(--warm-accent); font-size: 0.65rem; font-weight: 700; height: 48px; }
        
        /* 투데이 하이라이트 */
        .is-today { background: var(--today-bg) !important; position: relative; }
        th.is-today::after { content: ''; position: absolute; bottom: 8px; left: 15%; width: 70%; height: 3px; background: var(--warm-accent); border-radius: 2px; }

        /* ✨ 예쁜 커스텀 체크박스 */
        .chk-container { display: flex; justify-content: center; align-items: center; }
        .custom-chk { 
            width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--warm-border); 
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; background: white;
        }
        .custom-chk.checked { background: var(--warm-accent); border-color: var(--warm-accent); }
        .custom-chk.checked::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }

        /* 게시판 & 좋아요 */
        .board-container { background: var(--warm-card); border-radius: 20px; padding: 20px; border: 1px solid var(--warm-border); }
        .board-title { font-size: 1.1rem; font-weight: 800; color: var(--warm-text); margin-bottom: 15px; }
        .msg-item { padding: 12px 0; border-bottom: 1px solid var(--warm-bg); display: flex; align-items: flex-start; justify-content: space-between; }
        .msg-content-box { flex: 1; }
        .msg-name { font-weight: 800; color: var(--warm-point); font-size: 0.85rem; margin-right: 8px; }
        .msg-text { color: var(--warm-text); font-size: 0.9rem; line-height: 1.4; }
        .like-btn { 
            background: none; border: none; color: #FFB3B3; cursor: pointer; font-size: 1.1rem; 
            padding: 5px; transition: 0.2s; display: flex; align-items: center; gap: 3px;
        }
        .like-btn.liked { color: var(--warm-accent); transform: scale(1.1); }
        .like-count { font-size: 0.7rem; color: var(--warm-point); font-weight: 600; }

        .input-group { display: flex; gap: 8px; margin-top: 20px; background: var(--warm-bg); padding: 12px; border-radius: 12px; }
        input { border: 1px solid var(--warm-border); border-radius: 8px; padding: 10px; font-size: 0.9rem; color: var(--warm-text); }
        .btn-post { background: var(--warm-accent); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        #loading { position: fixed; inset: 0; background: var(--warm-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .spinner { width: 35px; height: 35px; border: 4px solid #E9E0D2; border-top: 4px solid var(--warm-accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div style="margin-top:15px; color: var(--warm-accent); font-weight: 700;">말씀의 숲으로 들어가는 중...</div></div>
    
    <div class="header">
        <h1>🌿 90일 성경통독</h1>
        <p id="period-display">기간 정보를 불러오고 있습니다</p>
    </div>

    <div class="stats-container content-box">
        <div class="stats-grid">
            <div class="stat-item"><span id="pct" class="stat-value">0%</span><span class="stat-label">진도율</span></div>
            <div class="stat-item"><span id="users" class="stat-value">0</span><span class="stat-label">성도님들</span></div>
            <div class="stat-item"><span id="checks" class="stat-value">0</span><span class="stat-label">읽은 횟수</span></div>
        </div>
        <div class="progress-wrapper"><div id="bar" class="progress-fill"></div></div>
    </div>

    <div class="table-outer content-box">
        <div id="scroll-area" class="table-inner">
            <table>
                <thead><tr id="h-row"><th>이름</th></tr></thead>
                <tbody id="a-body"></tbody>
            </table>
        </div>
    </div>

    <div class="board-container content-box">
        <div class="board-title">✨ 오늘의 은혜 나눔</div>
        <div id="m-list"></div>
        <div class="input-group">
            <input type="text" id="n-in" placeholder="이름" style="width: 55px;">
            <input type="text" id="c-in" placeholder="짧은 묵상을 나누어 주세요" style="flex: 1;">
            <button class="btn-post" onclick="postMessage()">등록</button>
        </div>
    </div>

    <div style="text-align:center; padding: 40px 0;">
        <button onclick="location.reload()" style="background:#E9E0D2; border:none; padding:10px 20px; border-radius:10px; color:var(--warm-text); font-weight:600;">새로고침</button>
        <button onclick="handleAdmin()" style="background:none; border:none; color:#C4B9AC; font-size:0.75rem; margin-left:15px;">관리자 모드</button>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let todayIdx = -1, startDt = null;

        async function init() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                if(data.startDate) {
                    const p = data.startDate.split('-');
                    startDt = new Date(p[0], p[1]-1, p[2]);
                    calcToday(data.startDate);
                }
                renderTable(data.attendance);
                updateStats();
                renderBoard(data.messages);
                if (todayIdx > 0) setTimeout(scrollToToday, 600);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').innerText = "데이터 연결 중..."; }
        }

        function calcToday(s) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let curr = new Date(s), count = 0;
            while (curr <= today && count < 180) { 
                if(curr.getDay() !== 0) { 
                    count++; 
                    if(curr.getTime() === today.getTime()) { todayIdx = count; break; } 
                } 
                curr.setDate(curr.getDate()+1); 
            }
            if(startDt) {
                let end = new Date(startDt), c = 0;
                while(c < 90) { if(end.getDay() !== 0) c++; if(c<90) end.setDate(end.getDate()+1); }
                document.getElementById('period-display').innerText = `${startDt.getMonth()+1}/${startDt.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}`;
            }
        }

        function renderTable(data) {
            const h = document.getElementById('h-row'), b = document.getElementById('a-body');
            let dCur = startDt ? new Date(startDt) : null;
            
            for(let i=1; i<=90; i++) {
                let th = document.createElement('th');
                if(dCur) { while(dCur.getDay() === 0) dCur.setDate(dCur.getDate()+1); }
                let dStr = dCur ? `${dCur.getMonth()+1}/${dCur.getDate()}` : "";
                th.innerHTML = `<span class="day-num">${i}일</span><span class="day-date">${dStr}</span>`;
                if(i === todayIdx) th.classList.add('is-today');
                th.id = `col-${i}`;
                h.appendChild(th);
                if(dCur) dCur.setDate(dCur.getDate()+1);
            }

            let pRow = document.createElement('tr'); pRow.className='plan-row'; pRow.innerHTML="<td>본문</td>";
            for(let i=1; i<=90; i++) {
                let td = document.createElement('td'); td.textContent = biblePlan[i];
                if(i === todayIdx) td.classList.add('is-today');
                pRow.appendChild(td);
            }
            b.appendChild(pRow);

            for(let r=1; r<data.length; r++) {
                let name = data[r][0]; if(!name) continue;
                let tr = document.createElement('tr');
                let tn = document.createElement('td'); tn.textContent = name; tr.appendChild(tn);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td'); if(i===todayIdx) td.classList.add('is-today');
                    let isV = data[r][i]==="V";
                    let chk = document.createElement('div'); 
                    chk.className = `custom-chk ${isV ? 'checked' : ''}`;
                    chk.onclick = async () => {
                        if(!isAdmin) { alert("관리자만 체크할 수 있습니다."); return; }
                        chk.classList.toggle('checked');
                        updateStats();
                        fetch(URL, {method:'POST', body:JSON.stringify({type:'attendance', name, day:i, checked:chk.classList.contains('checked')})});
                    };
                    let wrap = document.createElement('div'); wrap.className='chk-container';
                    wrap.appendChild(chk); td.appendChild(wrap); tr.appendChild(td);
                }
                b.appendChild(tr);
            }
        }

        function updateStats() {
            const trs = document.querySelectorAll('#a-body tr');
            const users = trs.length > 1 ? trs.length - 1 : 0;
            let checks = document.querySelectorAll('.custom-chk.checked').length;
            const pct = users > 0 ? Math.round((checks / (users * 90)) * 100) : 0;
            document.getElementById('users').textContent = users;
            document.getElementById('checks').textContent = checks;
            document.getElementById('pct').textContent = pct + "%";
            setTimeout(() => { document.getElementById('bar').style.width = pct + "%"; }, 100);
        }

        function renderBoard(msgs) {
            const list = document.getElementById('m-list'); list.innerHTML = "";
            [...msgs].reverse().slice(0, 5).forEach((m, idx) => {
                let item = document.createElement('div'); item.className='msg-item';
                item.innerHTML = `
                    <div class="msg-content-box">
                        <span class="msg-name">${m.name}</span>
                        <div class="msg-text">${m.content}</div>
                    </div>
                    <button class="like-btn" onclick="this.classList.toggle('liked')">
                        ♥ <span class="like-count">${Math.floor(Math.random()*5)}</span>
                    </button>`;
                list.appendChild(item);
            });
        }

        async function postMessage() {
            const n = document.getElementById('n-in').value, c = document.getElementById('c-in').value;
            if(!n || !c) return;
            document.getElementById('loading').style.display = 'flex';
            await fetch(URL, {method:'POST', body:JSON.stringify({type:'message', name:n, content:c})});
            location.reload();
        }

        function scrollToToday() {
            const el = document.getElementById(`col-${todayIdx}`);
            if(el) document.getElementById('scroll-area').scrollTo({left: el.offsetLeft - 100, behavior:'smooth'});
        }

        function handleAdmin() {
            if(!isAdmin) { if(prompt("암호를 입력하세요")==="9191") { localStorage.setItem('bible_admin_mode','true'); location.reload(); } }
            else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
