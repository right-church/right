<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90일 성경통독 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { 
            --primary: #4e73df; 
            --secondary: #858796;
            --success: #1cc88a;
            --info: #36b9cc;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --bg-color: #f8f9fc;
            --card-bg: #ffffff;
            --border: #e3e6f0;
            --text-dark: #4e5e77;
            --text-light: #b7c1d1;
            --highlight: #fffbe6;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 12px 0;
            color: var(--text-dark);
            -webkit-text-size-adjust: none;
        }

        /* 헤더 디자인 */
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 1.3rem; font-weight: 800; margin: 0; color: var(--primary); letter-spacing: -0.5px; }
        .period-badge { 
            display: inline-block; font-size: 0.75rem; 
            background: var(--card-bg); color: var(--secondary);
            padding: 3px 12px; border-radius: 50px; 
            border: 1px solid var(--border); margin-top: 5px;
            font-weight: 500;
        }

        /* 카드 공통 스타일 */
        .card { 
            width: 94%; margin: 0 auto 12px; 
            background: var(--card-bg); border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 15px; box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* 통계 섹션 */
        .stats { display: flex; justify-content: space-around; margin-bottom: 12px; }
        .stat-box { text-align: center; }
        .stat-box .val { font-size: 1.15rem; font-weight: 800; color: var(--primary); display: block; }
        .stat-box .lbl { font-size: 0.7rem; color: var(--secondary); font-weight: 600; }
        
        .progress-container { background: #eaecf4; border-radius: 10px; height: 10px; overflow: hidden; position: relative; }
        .progress-bar { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--primary), var(--info));
            transition: width 1.2s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* 테이블 최적화 (넓이 45, 높이 38) */
        .table-wrapper { padding: 0; overflow: hidden; border: 1px solid var(--border); border-radius: 12px; }
        .scroll-area { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; }
        
        th, td { 
            height: 38px !important; /* 요청하신 높이 38px */
            border-bottom: 1px solid var(--border); 
            border-right: 1px solid var(--border); 
            text-align: center; vertical-align: middle; 
            box-sizing: border-box; padding: 0;
        }
        
        /* 이름 열 */
        th:first-child, td:first-child { 
            width: 60px !important; 
            position: sticky; left: 0; z-index: 10; 
            background: #fdfdfd; border-right: 2px solid var(--primary);
            font-size: 0.8rem; font-weight: 700; color: var(--primary);
        }
        
        /* 일반 데이터 칸 */
        th:not(:first-child), td:not(:first-child) { width: 45px !important; } /* 요청하신 넓이 45px */
        
        th { background: #f8f9fc; color: var(--secondary); font-size: 0.65rem; font-weight: 700; }
        
        /* 성경 본문 행 */
        .plan-row td { 
            background-color: var(--highlight); 
            color: #d97706; font-size: 0.6rem; font-weight: 700;
        }

        /* 체크박스 스타일 */
        input[type="checkbox"] { 
            appearance: none; -webkit-appearance: none;
            width: 20px; height: 20px; 
            border: 2px solid #d1d3e2; border-radius: 6px;
            background: #fff; cursor: pointer; transition: 0.2s;
            position: relative; margin: 0; vertical-align: middle;
        }
        input[type="checkbox"]:checked { background: var(--success); border-color: var(--success); }
        input[type="checkbox"]:checked::after {
            content: '✓'; color: white; position: absolute;
            left: 50%; top: 48%; transform: translate(-50%, -50%);
            font-size: 13px; font-weight: bold;
        }

        .today-mark { background-color: #eef2ff !important; position: relative; }
        .today-mark::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--primary);
        }
        .date-label { font-size: 0.5rem; color: var(--text-light); display: block; margin-bottom: -2px; }
        th.today-mark .date-label { color: var(--primary); font-weight: 800; }

        /* 게시판 디자인 */
        .board-header { font-size: 0.95rem; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .msg-box { background: #f8f9fc; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
        .msg-info { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .msg-name { font-weight: 800; font-size: 0.75rem; color: var(--primary); }
        .msg-text { font-size: 0.85rem; line-height: 1.4; color: var(--text-dark); }
        
        .input-group { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 5px; display: flex; gap: 5px; margin-top: 10px; }
        .input-group input { border: none; padding: 8px; font-size: 0.85rem; outline: none; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* 하단 내비 */
        .footer { display: flex; justify-content: center; gap: 10px; margin: 20px 0 40px; }
        .btn-ui { padding: 10px 20px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; color: white; }

        #loader { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        .dot-loader { width: 40px; height: 10px; background: radial-gradient(circle, var(--primary) 4px, transparent 5px); background-size: 15px 15px; animation: loader 0.8s infinite linear; }
        @keyframes loader { 0% { background-position: 0 0; } 100% { background-position: 15px 0; } }
    </style>
</head>
<body>
    <div id="loader"><div class="dot-loader"></div><p style="font-size:0.8rem; color:var(--primary); font-weight:700;">말씀 데이터를 연결 중...</p></div>

    <div class="header">
        <h1>📖 90일 성경통독</h1>
        <div id="tongdok-period" class="period-badge">Loading...</div>
    </div>

    <div class="card">
        <div class="stats">
            <div class="stat-box"><span id="total-users" class="val">-</span><span class="lbl">동역자</span></div>
            <div class="stat-box"><span id="total-checks" class="val">-</span><span class="lbl">읽은장수</span></div>
            <div class="stat-box"><span id="overall-percent" class="val">0%</span><span class="lbl">완독율</span></div>
        </div>
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
        <div class="table-wrapper">
            <div id="scroll-container" class="scroll-area">
                <table>
                    <thead><tr id="h-row"><th>이름</th></tr></thead>
                    <tbody id="a-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="board-header">💬 은혜나눔</div>
        <div id="msg-list"></div>
        <div class="input-group">
            <input type="text" id="in-name" placeholder="이름" style="width:50px; border-right: 1px solid var(--border) !important;">
            <input type="text" id="in-content" placeholder="오늘의 소감을 짧게 나눠보세요." style="flex:1;">
            <button class="btn-send" onclick="postMessage()">전송</button>
        </div>
    </div>

    <div class="footer">
        <button id="admin-btn" class="btn-ui" style="background:var(--secondary);" onclick="handleAdmin()">관리자</button>
        <button class="btn-ui" style="background:var(--primary);" onclick="location.reload()">새로고침</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvm0fZ7Cs1X7eeUAZAxUDfafqaZSSanAQE26_p8Qfml3HR0kQvELJrVkuKoQsHCCZd/exec";
        const biblePlan = { 1: "창1-13", 2: "창14-26", 3: "창27-39", 4: "창40-출2", 5: "출3-15", 6: "출16-29", 7: "출30-레2", 8: "레3-15", 9: "레16-민1", 10: "민2-14", 11: "민15-27", 12: "민28-신5", 13: "신6-18", 14: "신19-31", 15: "신32-수10", 16: "수11-23", 17: "수24-삿12", 18: "삿13-삼상1", 19: "삼상2-14", 20: "삼상15-27", 21: "삼상28-삼하9", 22: "삼하10-22", 23: "삼하23-왕상11", 24: "왕상12-왕하3", 25: "왕하4-16", 26: "왕하17-대상4", 27: "대상5-17", 28: "대상18-대하1", 29: "대하2-14", 30: "대하15-28", 31: "대하29-스5", 32: "스6-느8", 33: "느9-에8", 34: "에9-욥11", 35: "욥12-24", 36: "욥25-38", 37: "욥39-시9", 38: "시10-22", 39: "시23-35", 40: "시36-48", 41: "시49-61", 42: "시62-75", 43: "시76-88", 44: "시89-101", 45: "시102-114", 46: "시115-127", 47: "시128-140", 48: "시141-잠4", 49: "잠5-17", 50: "잠18-30", 51: "잠31-전12", 52: "아1-사5", 53: "사6-18", 54: "사19-32", 55: "사33-45", 56: "사46-58", 57: "사59-렘5", 58: "렘6-18", 59: "렘19-31", 60: "렘32-45", 61: "렘46-겔1", 62: "겔2-14", 63: "겔15-27", 64: "겔28-40", 65: "겔51-단5", 66: "단6-호7", 67: "호8-암3", 68: "암4-미2", 69: "미3-습2", 70: "습3-슥10", 71: "슥11-마5", 72: "마6-19", 73: "마20-막4", 74: "막5-눅1", 75: "눅2-14", 76: "눅15-요3", 77: "요4-16", 78: "요17-행9", 79: "행10-22", 80: "행23-롬7", 81: "롬8-고전4", 82: "고전5-고후1", 83: "고후2-갈1", 84: "갈2-빌3", 85: "빌4-살후3", 86: "딤전1-몬1", 87: "히1-약1", 88: "약2-요일2", 89: "요일3-계8", 90: "계9-22" };
        let isAdmin = localStorage.getItem('bible_admin_mode') === 'true';
        let tIndex = -1;

        async function init() {
            if(isAdmin) document.getElementById('admin-btn').textContent = "로그아웃";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if(data.startDate) {
                    calcToday(data.startDate);
                    showPeriod(data.startDate);
                }
                renderTable(data.attendance, data.startDate);
                updateStats(data.attendance);
                renderBoard(data.messages);
                if (tIndex > 0) setTimeout(scrollToToday, 600);
                document.getElementById('loader').style.display = 'none';
            } catch (e) { document.getElementById('loader').innerHTML = "서버 연결에 실패했습니다."; }
        }

        function showPeriod(s) {
            const start = parseD(s); if(!start) return;
            let curr = new Date(start), count = 0, end = new Date(start);
            while(count < 90) { if(curr.getDay()!==0) { count++; if(count===90) end=new Date(curr); } curr.setDate(curr.getDate()+1); }
            const f = (d) => `${d.getMonth()+1}/${d.getDate()}`;
            document.getElementById('tongdok-period').textContent = `📅 ${f(start)} ~ ${f(end)} (90일간)`;
        }

        function calcToday(s) {
            const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const start = parseD(s); if(!start || today < start) return;
            let curr = new Date(start), count = 0;
            while(curr <= today && count < 150) { if(curr.getDay()!==0) { count++; if(curr.getTime()===today.getTime()) { tIndex=count; break; } } curr.setDate(curr.getDate()+1); }
        }

        function parseD(s) { const p = s.split('-'); return p.length===3?new Date(p[0],p[1]-1,p[2]):null; }

        function renderTable(sd, ss) {
            const hr = document.getElementById('h-row'); const tb = document.getElementById('a-body'); const start = parseD(ss);
            hr.innerHTML = "<th>이름</th>"; tb.innerHTML = "";
            let cursor = start ? new Date(start) : null;
            for(let i=1; i<=90; i++) {
                let dStr = ""; if(cursor) { while(cursor.getDay()===0) cursor.setDate(cursor.getDate()+1); dStr = `${cursor.getMonth()+1}/${cursor.getDate()}`; }
                let th = document.createElement('th'); th.id = `day-${i}`;
                th.innerHTML = `<span class="date-label">${dStr}</span>${i}일`;
                if(i===tIndex) th.className = 'today-mark';
                hr.appendChild(th); if(cursor) cursor.setDate(cursor.getDate()+1);
            }
            let pr = document.createElement('tr'); pr.className='plan-row'; pr.innerHTML="<td>본문</td>";
            for(let i=1; i<=90; i++) { let td=document.createElement('td'); td.innerHTML=biblePlan[i]||""; if(i===tIndex) td.className='today-mark'; pr.appendChild(td); }
            tb.appendChild(pr);
            for(let r=1; r<sd.length; r++) {
                let n = sd[r][0]; if(!n) continue;
                let tr = document.createElement('tr'); let tn = document.createElement('td'); tn.textContent = n; tr.appendChild(tn);
                for(let i=1; i<=90; i++) {
                    let td = document.createElement('td'); if(i===tIndex) td.className='today-mark';
                    let cb = document.createElement('input'); cb.type='checkbox'; cb.checked=(sd[r][i]==="V");
                    cb.onclick = async (e) => {
                        if(!isAdmin) { e.preventDefault(); alert("관리자 모드에서만 체크 가능합니다."); return; }
                        updateStats(sd); fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'attendance', name:n, day:i, checked:cb.checked})});
                    };
                    td.appendChild(cb); tr.appendChild(td);
                }
                tb.appendChild(tr);
            }
        }

        function updateStats(sd) {
            const users = sd.length - 1; let checks = 0;
            document.querySelectorAll('#a-body tr:not(.plan-row) input[type="checkbox"]').forEach(c => {if(c.checked) checks++;});
            const pct = Math.round((checks / (users * 90)) * 100) || 0;
            document.getElementById('total-users').textContent = users;
            document.getElementById('total-checks').textContent = checks;
            document.getElementById('overall-percent').textContent = pct + "%";
            setTimeout(() => { document.getElementById('progress-bar').style.width = pct + "%"; }, 100);
        }

        function renderBoard(ms) {
            const l = document.getElementById('msg-list'); l.innerHTML = "";
            [...ms].reverse().slice(0, 5).forEach(m => {
                const i = document.createElement('div'); i.className = 'msg-box';
                i.innerHTML = `<div class="msg-info"><span class="msg-name">${m.name}</span><span style="font-size:0.6rem; color:var(--text-light)">❤️ ${m.likes}</span></div><div class="msg-text">${m.content}</div>`;
                l.appendChild(i);
            });
        }

        async function postMessage() {
            const n = document.getElementById('in-name').value; const c = document.getElementById('in-content').value;
            if(!n || !c) return; document.getElementById('loader').style.display='flex';
            await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'message', name:n, content:c})});
            location.reload();
        }

        function scrollToToday() {
            const s = document.getElementById('scroll-container'); const t = document.getElementById(`day-${tIndex}`);
            if(t) s.scrollTo({ left: t.offsetLeft - (window.innerWidth/2) + 22, behavior: 'smooth' });
        }

        function handleAdmin() {
            if(!isAdmin) { if(prompt("인증키를 입력하세요")==="9191") { localStorage.setItem('bible_admin_mode','true'); location.reload(); } }
            else { localStorage.removeItem('bible_admin_mode'); location.reload(); }
        }
        init();
    </script>
</body>
</html>
